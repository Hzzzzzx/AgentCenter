<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentCenter · AI 编排工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #0c1222;
      --bg-insight: #1a2744;
      --bg-card: rgba(30, 41, 59, 0.7);
      --bg-card-hover: rgba(30, 41, 59, 0.9);
      --border-color: #334155;
      --border-color-light: rgba(148, 163, 184, 0.1);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-cyan: #06b6d4;
      --accent-cyan-dim: rgba(6, 182, 212, 0.15);
      --accent-cyan-glow: rgba(6, 182, 212, 0.3);
      --accent-blue: #3b82f6;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --glow-cyan: rgba(6, 182, 212, 0.4);
    }

    body {
      font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root { height: 100%; }

    .app-container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
    }

    .sidebar-header {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border-color);
      gap: 12px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 16px; height: 16px; color: white; }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .logo-subtitle {
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.2;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .sidebar-section {
      padding: 0 12px;
      margin-bottom: 16px;
    }

    .sidebar-section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 8px;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      transition: all 0.15s ease;
      border-left: 2px solid transparent;
      margin-bottom: 2px;
    }

    .nav-item:hover {
      background: rgba(148, 163, 184, 0.05);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: rgba(6, 182, 212, 0.1);
      color: var(--accent-cyan);
      border-left-color: var(--accent-cyan);
    }

    .nav-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .nav-divider {
      height: 1px;
      background: var(--border-color);
      margin: 12px 12px;
    }

    /* Agent Cards */
    .agent-card {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .agent-card:hover {
      background: rgba(15, 23, 42, 0.8);
    }

    .agent-card.active {
      border-left-color: var(--accent-cyan);
      background: rgba(6, 182, 212, 0.08);
    }

    .agent-card.active .agent-status {
      animation: pulse-glow 2s infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 4px var(--accent-cyan); }
      50% { box-shadow: 0 0 12px var(--accent-cyan); }
    }

    .agent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .agent-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .agent-status {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .agent-status.idle {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
    }

    .agent-status.working {
      background: rgba(6, 182, 212, 0.15);
      color: var(--accent-cyan);
    }

    .agent-status.analysis {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
    }

    .agent-status.monitoring {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
    }

    .agent-status .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .agent-status.working .dot {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .agent-action {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-card.active .agent-action {
      color: var(--text-secondary);
    }

    /* Engine Status */
    .engine-status {
      padding: 12px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 8px;
      margin: 0 12px;
    }

    .engine-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .engine-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }

    .engine-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .engine-subtitle {
      font-size: 11px;
      color: var(--text-muted);
    }

    .engine-progress {
      margin-top: 8px;
    }

    .engine-progress-bar {
      height: 4px;
      background: var(--border-color);
      border-radius: 2px;
      overflow: hidden;
    }

    .engine-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .engine-progress-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 240px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Top Bar */
    .top-bar {
      height: 48px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ai-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      background: rgba(6, 182, 212, 0.1);
      border-radius: 16px;
      border: 1px solid rgba(6, 182, 212, 0.2);
    }

    .ai-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-cyan);
      animation: pulse 2s infinite;
    }

    .ai-status-text {
      font-size: 12px;
      color: var(--accent-cyan);
      font-weight: 500;
    }

    .top-bar-center {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .search-bar {
      width: 100%;
      max-width: 400px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .search-bar:focus-within {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 2px var(--accent-cyan-dim);
    }

    .search-bar svg {
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 13px;
      color: var(--text-primary);
    }

    .search-bar input::placeholder {
      color: var(--text-muted);
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .top-bar-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s ease;
      position: relative;
    }

    .top-bar-icon:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .top-bar-icon svg {
      width: 18px;
      height: 18px;
    }

    .notification-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 14px;
      height: 14px;
      background: var(--error);
      border-radius: 50%;
      font-size: 9px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: white;
      cursor: pointer;
    }

    /* Content Area */
    .content-area {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
    }

    /* Insight Bar */
    .insight-bar {
      background: var(--bg-insight);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }

    .insight-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .insight-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-cyan);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .insight-title svg {
      width: 14px;
      height: 14px;
    }

    .insight-carousel {
      position: relative;
      height: 52px;
    }

    .insight-card {
      position: absolute;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: rgba(15, 23, 42, 0.6);
      border-radius: 8px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease;
    }

    .insight-card.active {
      opacity: 1;
      transform: translateY(0);
    }

    .insight-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .insight-icon.warning {
      background: rgba(245, 158, 11, 0.15);
    }

    .insight-icon.suggestion {
      background: rgba(6, 182, 212, 0.15);
    }

    .insight-icon.success {
      background: rgba(34, 197, 94, 0.15);
    }

    .insight-content {
      flex: 1;
    }

    .insight-text {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .insight-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .insight-dots {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-left: 12px;
    }

    .insight-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border-color);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .insight-dot.active {
      background: var(--accent-cyan);
      width: 16px;
      border-radius: 3px;
    }

    /* Action Cards */
    .action-section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .action-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .action-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-cyan);
      box-shadow: 0 4px 20px rgba(6, 182, 212, 0.15);
    }

    .action-card.warning:hover {
      border-color: var(--warning);
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.15);
    }

    .action-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .action-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .action-icon.deploy {
      background: rgba(6, 182, 212, 0.15);
    }

    .action-icon.check {
      background: rgba(59, 130, 246, 0.15);
    }

    .action-icon.alert {
      background: rgba(245, 158, 11, 0.15);
    }

    .action-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .action-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .action-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .action-chip {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(148, 163, 184, 0.1);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .action-chip.success {
      background: rgba(34, 197, 94, 0.1);
      color: var(--success);
    }

    .action-btn {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
    }

    .action-btn.primary {
      background: var(--accent-cyan);
      color: #0f172a;
    }

    .action-btn.primary:hover {
      background: #0891b2;
    }

    .action-btn.outline {
      background: transparent;
      border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .action-btn.outline:hover {
      background: var(--accent-cyan-dim);
    }

    .action-btn.warning {
      background: var(--warning);
      color: #0f172a;
    }

    .action-btn.warning:hover {
      background: #d97706;
    }

    /* Pipeline Section */
    .pipeline-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .pipeline-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .pipeline-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pipeline-stages {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      position: relative;
    }

    .pipeline-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100px;
      position: relative;
    }

    .stage-node {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 8px;
      position: relative;
      transition: all 0.2s ease;
    }

    .stage-node.completed {
      background: rgba(34, 197, 94, 0.15);
      border: 2px solid var(--success);
      color: var(--success);
    }

    .stage-node.running {
      background: rgba(6, 182, 212, 0.15);
      border: 2px solid var(--accent-cyan);
      color: var(--accent-cyan);
      animation: stage-pulse 1.5s infinite;
    }

    @keyframes stage-pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--accent-cyan-glow); }
      50% { box-shadow: 0 0 0 8px transparent; }
    }

    .stage-node.waiting {
      background: rgba(148, 163, 184, 0.1);
      border: 2px solid var(--border-color);
      color: var(--text-muted);
    }

    .stage-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .stage-agent {
      font-size: 10px;
      color: var(--text-secondary);
      margin-bottom: 2px;
    }

    .stage-tool {
      font-size: 9px;
      color: var(--text-muted);
    }

    .pipeline-connector {
      flex: 1;
      height: 2px;
      position: relative;
      top: 23px;
      margin: 0 -8px;
    }

    .connector-line {
      height: 100%;
      position: absolute;
      left: 0;
      right: 0;
    }

    .connector-line.completed {
      background: var(--accent-cyan);
    }

    .connector-line.running {
      background: repeating-linear-gradient(
        90deg,
        var(--accent-cyan) 0px,
        var(--accent-cyan) 8px,
        transparent 8px,
        transparent 16px
      );
      animation: connector-flow 1s linear infinite;
    }

    @keyframes connector-flow {
      0% { background-position: 0 0; }
      100% { background-position: 16px 0; }
    }

    .connector-line.waiting {
      background: repeating-linear-gradient(
        90deg,
        var(--border-color) 0px,
        var(--border-color) 4px,
        transparent 4px,
        transparent 8px
      );
    }

    /* History Section */
    .history-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 16px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .history-item:hover {
      background: rgba(15, 23, 42, 0.8);
    }

    .history-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .history-icon.deploy {
      background: rgba(6, 182, 212, 0.15);
    }

    .history-icon.fix {
      background: rgba(245, 158, 11, 0.15);
    }

    .history-icon.publish {
      background: rgba(34, 197, 94, 0.15);
    }

    .history-content {
      flex: 1;
      min-width: 0;
    }

    .history-title {
      font-size: 13px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .history-status {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .history-status.completed {
      background: rgba(34, 197, 94, 0.1);
      color: var(--success);
    }

    .history-time {
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-primary);
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

      };
      return icons[name] || icons['bot'];
    };

    const insights = [
      {
        id: 1,
        type: 'warning',
        icon: '⚠️',
        text: 'identity-domain P99 延迟上升 40%，可能影响订单转化率',
        time: '2 分钟前'
      },
      {
        id: 2,
        type: 'suggestion',
        icon: '💡',
        text: 'REQ-102 的所有依赖需求已完成，建议启动开发',
        time: '5 分钟前'
      },
      {
        id: 3,
        type: 'success',
        icon: '📊',
        text: '本周部署成功率 98.5%，较上周提升 2.1%',
        time: '1 小时前'
      }
    ];

    // Agent data
    const agents = [
      {
        id: 'demand',
        name: '需求分析',
        status: 'working',
        action: '更新 REQ-102',
        tool: '需求管理平台'
      },
      {
        id: 'code',
        name: '代码审查',
        status: 'idle',
        action: '等待下一个任务',
        tool: '代码质量平台'
      },
      {
        id: 'quality',
        name: '质量验证',
        status: 'analysis',
        action: '分析测试覆盖率',
        tool: '测试平台'
      },
      {
        id: 'deploy',
        name: '部署编排',
        status: 'idle',
        action: '等待下一个任务',
        tool: '部署平台'
      },
      {
        id: 'monitor',
        name: '监控预警',
        status: 'monitoring',
        action: '追踪 identity-domain',
        tool: '可观测性平台'
      }
    ];

    // Pipeline stages
    const pipelineStages = [
      { name: '需求', agent: '需求Agent', tool: '需求管理平台', status: 'completed' },
      { name: '设计', agent: '需求Agent', tool: '设计协作平台', status: 'completed' },
      { name: '开发', agent: '代码Agent', tool: '代码仓库', status: 'running' },
      { name: '检查', agent: '代码Agent', tool: '代码质量平台', status: 'waiting' },
      { name: '构建', agent: '构建Agent', tool: '构建引擎', status: 'waiting' },
      { name: '测试', agent: '构建Agent', tool: '测试平台', status: 'waiting' },
      { name: '部署', agent: '部署Agent', tool: '部署平台', status: 'waiting' },
      { name: '运维', agent: '监控Agent', tool: '可观测性平台', status: 'waiting' }
    ];

    // History data
    const historyItems = [
      {
        id: 1,
        type: 'deploy',
        icon: '🚀',
        title: '部署 billing-domain v1.8.0 到生产环境',
        status: 'completed',
        time: '15 分钟前'
      },
      {
        id: 2,
        type: 'fix',
        icon: '🔧',
        title: '处理 INC-0891 数据库连接超时',
        status: 'completed',
        time: '2 小时前'
      },
      {
        id: 3,
        type: 'publish',
        icon: '📋',
        title: '发布 REQ-98 用户注册优化',
        status: 'completed',
        time: '昨天 14:30'
      },
      {
        id: 4,
        type: 'deploy',
        icon: '🚀',
        title: '部署 integration-gateway v3.1.0',
        status: 'completed',
        time: '昨天 10:15'
      }
    ];

    // Navigation items
    const navItems = [
      { id: 'overview', label: '智能总览', icon: 'layout-dashboard', active: true, url: '/a-version.html' },
      { id: 'conversation', label: '对话编排', icon: 'message-square', active: false, url: '/a-version-view2.html' },
      { id: 'monitor', label: '编排监控', icon: 'activity', active: false, url: '/a-version-view3.html' },
      { id: 'topology', label: '服务拓扑', icon: 'network', active: false, url: '/a-version-view4.html' },
      { id: 'architecture', label: '架构说明', icon: 'layers', active: false, url: '/a-version-view5.html' }
    ];

    function App() {
      const [activeInsight, setActiveInsight] = useState(0);
      const [toastMessage, setToastMessage] = useState('');
      const [toastVisible, setToastVisible] = useState(false);
      const insightIntervalRef = useRef(null);

      useEffect(() => {
        insightIntervalRef.current = setInterval(() => {
          setActiveInsight(prev => (prev + 1) % insights.length);
        }, 5000);

        return () => {
          if (insightIntervalRef.current) {
            clearInterval(insightIntervalRef.current);
          }
        };
      }, []);

      const showToast = (message) => {
        setToastMessage(message);
        setToastVisible(true);
        setTimeout(() => setToastVisible(false), 3000);
      };

      const handleInsightDotClick = (index) => {
        setActiveInsight(index);
        if (insightIntervalRef.current) {
          clearInterval(insightIntervalRef.current);
        }
        insightIntervalRef.current = setInterval(() => {
          setActiveInsight(prev => (prev + 1) % insights.length);
        }, 5000);
      };

      const handleActionClick = (title) => {
        showToast(`编排任务已启动: ${title}`);
      };

      const handleNavClick = (id) => {
        const item = navItems.find(n => n.id === id);
        if (item && item.url) {
          window.location.href = item.url;
        }
      };

      const handleAgentClick = (agent) => {
        showToast(`查看 Agent: ${agent.name}`);
      };

      const handleHistoryClick = (item) => {
        showToast(`查看编排详情: ${item.title}`);
      };

      const getStatusLabel = (status) => {
        switch(status) {
          case 'idle': return '空闲';
          case 'working': return '执行中';
          case 'analysis': return '分析中';
          case 'monitoring': return '监控中';
          default: return status;
        }
      };

      return (
        <div className="app-container">
          {/* Sidebar */}
          <aside className="sidebar">
            <div className="sidebar-header">
              <div className="logo-icon">
                <Icon name="bot" size={16} />

              <div className="logo-text">

                <span className="logo-subtitle">AI 编排工作台</span>
              </div>
            </div>

            <div className="sidebar-content">
              <div className="sidebar-section">
                {navItems.map(item => (
                  <div
                    key={item.id}
                    className={`nav-item ${item.active ? 'active' : ''}`}
                    onClick={() => handleNavClick(item.id)}
                  >
                    <Icon name={item.icon} size={16} />
                    <span>{item.label}</span>
                  </div>
                ))}
              </div>

              <div className="nav-divider"></div>

              <div className="sidebar-section">
                <div className="sidebar-section-title">智能体</div>
                {agents.map(agent => (
                  <div
                    key={agent.id}
                    className={`agent-card ${agent.status === 'working' || agent.status === 'monitoring' ? 'active' : ''}`}
                    onClick={() => handleAgentClick(agent)}
                  >
                    <div className="agent-header">
                      <span className="agent-name">
                        <span>🤖</span>
                        {agent.name} Agent
                      </span>
                      <span className={`agent-status ${agent.status}`}>
                        <span className="dot"></span>
                        {getStatusLabel(agent.status)}
                      </span>
                    </div>
                    <div className="agent-action">
                      {agent.action} · {agent.tool}
                    </div>
                  </div>
                ))}
              </div>

              <div className="nav-divider"></div>

              <div className="sidebar-section">
                <div className="sidebar-section-title">编排引擎</div>
                <div className="engine-status">
                  <div className="engine-header">
                    <div className="engine-dot"></div>
                    <span className="engine-title">在线</span>
                  </div>
                  <div className="engine-subtitle">当前 1 个编排任务</div>
                  <div className="engine-progress">
                    <div className="engine-progress-bar">
                      <div className="engine-progress-fill" style={{width: '60%'}}></div>
                    </div>
                    <div className="engine-progress-label">
                      <span>部署 identity-domain</span>
                      <span>60%</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </aside>

          {/* Main Content */}
          <main className="main-content">
            {/* Top Bar */}
            <nav className="top-bar">
              <div className="top-bar-left">
                <div className="ai-status">
                  <div className="ai-status-dot"></div>
                  <span className="ai-status-text">AI 引擎在线</span>
                </div>
              </div>

              <div className="top-bar-center">
                <div className="search-bar">
                  <Icon name="search" size={14} />
                  <input type="text" placeholder="搜索服务、需求、工单..." />
                </div>
              </div>

              <div className="top-bar-right">
                <div className="top-bar-icon">
                  <Icon name="bell" size={18} />
                  <span className="notification-badge">3</span>
                </div>
                <div className="user-avatar">李</div>
              </div>
            </nav>

            {/* Content Area */}

              {/* Insight Bar */}
              <div className="insight-bar">
                <div className="insight-header">
                  <span className="insight-title">
                    <Icon name="brain" size={14} />
                    AI 洞察
                  </span>
                </div>
                <div className="insight-carousel">
                  {insights.map((insight, index) => (
                    <div
                      key={insight.id}
                      className={`insight-card ${index === activeInsight ? 'active' : ''}`}
                    >
                      <div className={`insight-icon ${insight.type}`}>
                        {insight.icon}
                      </div>
                      <div className="insight-content">
                        <div className="insight-text">{insight.text}</div>
                        <div className="insight-meta">{insight.time}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="insight-dots">
                  {insights.map((_, index) => (
                    <div
                      key={index}
                      className={`insight-dot ${index === activeInsight ? 'active' : ''}`}
                      onClick={() => handleInsightDotClick(index)}
                    ></div>
                  ))}
                </div>
              </div>

              {/* AI Recommended Actions */}
              <div className="action-section">
                <div className="section-title">
                  <span>🎯</span>
                  AI 建议操作
                </div>
                <div className="action-cards">
                  <div className="action-card" onClick={() => handleActionClick('一键部署 identity-domain v2.3.2')}>
                    <div className="action-card-header">
                      <div className="action-icon deploy">🚀</div>
                      <span className="action-title">一键部署 identity-domain v2.3.2</span>
                    </div>
                    <div className="action-subtitle">
                      需求已确认，代码已合并，可部署到生产
                    </div>
                    <div className="action-chips">
                      <span className="action-chip success">✓ 代码审查通过</span>
                      <span className="action-chip success">✓ 构建测试通过</span>
                    </div>
                    <button className="action-btn primary" onClick={(e) => { e.stopPropagation(); handleActionClick('一键部署 identity-domain v2.3.2'); }}>
                      启动编排 →
                    </button>
                  </div>

                  <div className="action-card" onClick={() => handleActionClick('全服务健康检查')}>
                    <div className="action-card-header">
                      <div className="action-icon check">🔍</div>
                      <span className="action-title">全服务健康检查</span>
                    </div>
                    <div className="action-subtitle">
                      identity-domain 延迟异常，建议全面检查
                    </div>
                    <div className="action-chips">
                      <span className="action-chip">受影响的微服务 3 个</span>
                    </div>
                    <button className="action-btn outline" onClick={(e) => { e.stopPropagation(); handleActionClick('全服务健康检查'); }}>
                      启动检查 →
                    </button>
                  </div>

                  <div className="action-card warning" onClick={() => handleActionClick('处理告警 INC-0892')}>

                    <div className="action-chips">

                    </div>
                    <button className="action-btn warning" onClick={(e) => { e.stopPropagation(); handleActionClick('处理告警 INC-0892'); }}>
                      启动处理 →
                    </button>
                  </div>
                </div>
              </div>

              {/* Enhanced Pipeline */}
              <div className="pipeline-section">
                <div className="pipeline-header">
                  <div className="pipeline-title">
                    <span>📊</span>
                    当前编排流水线
                  </div>
                </div>
                <div className="pipeline-stages">
                  {pipelineStages.map((stage, index) => (
                    <React.Fragment key={stage.name}>
                      <div className="pipeline-stage">
                        <div className={`stage-node ${stage.status}`}>
                          {stage.status === 'completed' && '✓'}
                          {stage.status === 'running' && '🏃'}
                          {stage.status === 'waiting' && '⏳'}
                        </div>
                        <div className="stage-name">{stage.name}</div>
                        <div className="stage-agent">{stage.agent}</div>
                        <div className="stage-tool">{stage.tool}</div>
                      </div>
                      {index < pipelineStages.length - 1 && (
                        <div className="pipeline-connector">
                          <div className={`connector-line ${index < 2 ? (index === 1 ? 'running' : 'completed') : 'waiting'}`}></div>
                        </div>
                      )}
                    </React.Fragment>
                  ))}
                </div>
              </div>

              {/* Recent History */}
              <div className="history-section">
                <div className="pipeline-header">
                  <div className="pipeline-title">
                    <span>📋</span>
                    最近编排记录
                  </div>
                </div>
                <div className="history-list">
                  {historyItems.map(item => (
                    <div
                      key={item.id}
                      className="history-item"
                      onClick={() => handleHistoryClick(item)}
                    >
                      <div className={`history-icon ${item.type}`}>
                        {item.icon}
                      </div>
                      <div className="history-content">
                        <div className="history-title">{item.title}</div>
                        <div className="history-meta">
                          <span className={`history-status ${item.status}`}>
                            ✓ {item.status === 'completed' ? '完成' : item.status}
                          </span>
                        </div>
                      </div>
                      <span className="history-time">{item.time}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </main>

          {/* Toast */}
          <div className={`toast ${toastVisible ? 'show' : ''}`}>
            {toastMessage}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
