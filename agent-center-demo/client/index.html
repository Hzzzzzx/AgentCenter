<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentCenter - DevOps 智能中枢</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #f6f8fb;
      --bg-secondary: #ffffff;
      --bg-tertiary: #eef2f7;
      --bg-card: #ffffff;
      --bg-card-hover: #f8fafc;
      --border-color: #d9e2ec;
      --border-color-hover: #b9c7d8;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --info: #06b6d4;
      --glow-blue: rgba(59, 130, 246, 0.15);
      --glow-purple: rgba(139, 92, 246, 0.15);
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    #root { height: 100%; }

    /* .app-container removed — now using .workbench-shell grid */

    /* Workbench Shell — VS Code-inspired grid layout */
    .workbench-shell {
      --titlebar-height: 56px;
      --top-panel-height: 36px;
      --bottom-panel-height: 44px;
      height: 100vh;
      display: grid;
      grid-template-columns: 16px 280px 16px minmax(640px, 1fr) 16px 320px 16px;
      grid-template-rows: var(--titlebar-height) var(--top-panel-height) minmax(0, 1fr) var(--bottom-panel-height) 32px;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      transition: grid-template-rows 180ms ease;
    }
    .workbench-shell.has-top-expanded {
      --top-panel-height: 164px;
    }
    .workbench-shell.has-bottom-expanded {
      --bottom-panel-height: 300px;
    }
    .workbench-shell.is-titlebar-collapsed {
      --titlebar-height: 32px;
    }
    .workbench-main {
      display: contents;
    }
    .workbench-shell.is-left-collapsed {
      grid-template-columns: 16px 48px 16px minmax(640px, 1fr) 16px 320px 16px;
    }
    .workbench-shell.is-right-collapsed {
      grid-template-columns: 16px 280px 16px minmax(640px, 1fr) 16px 48px 16px;
    }
    .workbench-shell.is-left-collapsed.is-right-collapsed {
      grid-template-columns: 16px 48px 16px minmax(640px, 1fr) 16px 48px 16px;
    }
    .workbench-titlebar {
      grid-column: 1 / -1;
      grid-row: 1;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 20px;
    }
    .workbench-shell.is-titlebar-collapsed .nav-center,
    .workbench-shell.is-titlebar-collapsed .nav-right .nav-icon-btn,
    .workbench-shell.is-titlebar-collapsed .nav-right .user-info,
    .workbench-shell.is-titlebar-collapsed .version-badge {
      display: none;
    }
    .workbench-shell.is-titlebar-collapsed .logo-icon {
      width: 22px !important;
      height: 22px !important;
    }
    .workbench-shell.is-titlebar-collapsed .logo-text {
      font-size: 13px !important;
    }
    .titlebar-toggle {
      margin-left: 8px;
    }
    .top-metrics-panel {
      grid-column: 4;
      grid-row: 2;
      background: var(--bg-primary);
      overflow: hidden;
      transition: max-height 180ms ease;
    }
    .top-metrics-panel.is-collapsed { max-height: 36px; min-height: 36px; }
    .top-metrics-panel.is-expanded { max-height: 164px; min-height: 164px; }
    .bottom-history-panel {
      grid-column: 4;
      grid-row: 4;
      background: var(--bg-primary);
      overflow: hidden;
      transition: max-height 180ms ease;
      min-height: 0;
    }
    .bottom-history-panel.is-collapsed { max-height: 44px; min-height: 44px; }
    .bottom-history-panel.is-expanded { max-height: 300px; min-height: 300px; }
    .panel-center-rail {
      height: 100%;
      width: 100%;
      min-width: 0;
      overflow: hidden;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
    }
    .top-metrics-panel .panel-center-rail {
      border-bottom: 1px solid var(--border-color);
      border-radius: 0 0 8px 8px;
    }
    .bottom-history-panel .panel-center-rail {
      border-top: 1px solid var(--border-color);
      border-radius: 8px 8px 0 0;
    }
    .panel-toggle {
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-muted);
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .panel-toggle:hover {
      color: var(--text-primary);
      border-color: var(--border-color-hover);
      background: var(--bg-card-hover);
    }
    .top-panel-stack {
      height: 100%;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .top-panel-bar {
      height: 36px;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px 0 16px;
    }
    .top-metrics-panel.is-collapsed .metrics-strip {
      display: none;
    }
    .top-metrics-panel.is-expanded .metrics-strip {
      flex: 1;
      min-height: 0;
    }
    .side-panel-toggle {
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-secondary);
      width: 30px;
      height: 30px;
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .side-panel-toggle:hover {
      border-color: var(--border-color-hover);
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }
    .side-panel-toggle i {
      width: 16px;
      height: 16px;
    }
    .side-panel-glyph {
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
    }
    .workbench-left {
      grid-column: 2;
      grid-row: 2 / 5;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
    }
    .workbench-shell.is-left-collapsed .workbench-left {
      overflow: hidden;
    }
    .workbench-shell.is-left-collapsed .workbench-left > * {
      opacity: 0;
      pointer-events: none;
    }
    .workbench-center {
      grid-column: 4;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .workbench-right {
      grid-column: 6;
      grid-row: 2 / 5;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-color);
      min-height: 0;
      overflow-y: auto;
    }
    .workbench-shell.is-right-collapsed .workbench-right {
      overflow: hidden;
    }
    .workbench-shell.is-right-collapsed .workbench-right > * {
      opacity: 0;
      pointer-events: none;
    }
    .footer-status {
      grid-column: 1 / -1;
      grid-row: 5;
      background: var(--bg-tertiary);
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .footer-status-content {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    @media (max-width: 1279px) {
      .workbench-shell {
        grid-template-columns: 12px 260px 12px minmax(520px, 1fr) 12px 300px 12px;
      }
      .workbench-shell.is-left-collapsed {
        grid-template-columns: 12px 48px 12px minmax(520px, 1fr) 12px 300px 12px;
      }
      .workbench-shell.is-right-collapsed {
        grid-template-columns: 12px 260px 12px minmax(520px, 1fr) 12px 48px 12px;
      }
      .workbench-shell.is-left-collapsed.is-right-collapsed {
        grid-template-columns: 12px 48px 12px minmax(520px, 1fr) 12px 48px 12px;
      }
    }

    /* Sidebar — now a grid child of .workbench-left, NOT fixed */
    .sidebar {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .sidebar-header {
      display: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-gradient);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--glow-blue);
    }

    .logo-icon svg { width: 20px; height: 20px; color: white; }

    .logo-text { font-size: 18px; font-weight: 600; color: var(--text-primary); }

    .version-badge {
      background: var(--bg-tertiary);
      color: var(--accent-blue);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
      font-weight: 500;
    }

    .sidebar-content { flex: 1; overflow-y: auto; padding: 16px 0; }

    .sidebar-section {
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(217, 226, 236, 0.65);
      padding-bottom: 10px;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 0 20px;
      margin-bottom: 8px;
    }

    .sidebar-section-toggle {
      width: 100%;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 8px 20px;
      color: var(--text-muted);
      cursor: pointer;
    }

    .sidebar-section-toggle .sidebar-section-title {
      padding: 0;
      margin: 0;
    }

    .sidebar-section-toggle:hover .sidebar-section-title,
    .sidebar-section-toggle:hover .sidebar-section-chevron {
      color: var(--text-primary);
    }

    .sidebar-section-chevron {
      font-size: 13px;
      color: var(--text-muted);
      transition: transform 0.18s ease;
      line-height: 1;
    }

    .sidebar-section-toggle[aria-expanded="false"] .sidebar-section-chevron {
      transform: rotate(-90deg);
    }

    .sidebar-section-body {
      overflow: hidden;
    }

    .conversation-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 12px;
    }

    .conversation-list-item {
      border: 1px solid transparent;
      background: transparent;
      border-radius: 8px;
      padding: 9px 10px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.18s ease;
      text-align: left;
    }

    .conversation-list-item:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-color);
    }

    .conversation-list-item.active {
      background: rgba(59, 130, 246, 0.1);
      border-color: rgba(59, 130, 246, 0.28);
      color: var(--accent-blue);
    }

    .conversation-list-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 3px;
    }

    .conversation-list-title {
      font-size: 12px;
      font-weight: 600;
      color: inherit;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conversation-list-time {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .conversation-list-meta {
      font-size: 11px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conversation-list-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
      font-size: 10px;
      color: var(--success);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: rgba(59, 130, 246, 0.1);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
      border-left-color: var(--accent-blue);
    }

    .nav-item i { width: 18px; height: 18px; opacity: 0.8; }
    .nav-item span { font-size: 14px; }

    /* Tool Status */
    .tool-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tool-item:hover { background: var(--bg-card-hover); }

    .tool-info { display: flex; align-items: center; gap: 10px; }

    .tool-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .tool-status-dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .tool-status-dot.delayed { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
    .tool-status-dot.error { background: var(--error); box-shadow: 0 0 8px var(--error); }

    .tool-name { font-size: 13px; color: var(--text-secondary); }
    .tool-status-text { font-size: 11px; color: var(--text-muted); }

    /* Agent Status */
    .agent-item {
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .agent-item:hover { background: var(--bg-card-hover); }

    .agent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .agent-name { font-size: 13px; color: var(--text-secondary); }

    .agent-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .agent-status.idle { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .agent-status.working { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
    .agent-status.alert { background: rgba(245, 158, 11, 0.15); color: var(--warning); animation: alertPulse 1.5s infinite; }

    .agent-status .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .agent-status.working .dot { animation: breathe 1.5s infinite; }

    .agent-task { font-size: 11px; color: var(--text-muted); margin-left: 18px; }

    .sidebar-footer { padding: 12px 20px; border-top: 1px solid var(--border-color); }

    .system-settings {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      padding: 8px 0;
      transition: color 0.2s ease;
    }

    .system-settings:hover { color: var(--text-primary); }

    /* .main-content removed — now using .workbench-shell grid */

    /* Top Navigation — inside titlebar now */
    .top-nav {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0;
    }

    .nav-left { display: flex; align-items: center; gap: 16px; }

    .collapse-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }

    .collapse-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }

    .nav-center { flex: 1; max-width: 480px; margin: 0 40px; }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0 16px;
      height: 40px;
      transition: all 0.2s ease;
    }

    .search-bar:focus-within {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .search-bar i { color: var(--text-muted); width: 18px; height: 18px; }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 14px;
      margin-left: 10px;
    }

    .search-bar input::placeholder { color: var(--text-muted); }

    .nav-right { display: flex; align-items: center; gap: 8px; }

    .nav-icon-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      position: relative;
    }

    .nav-icon-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .nav-icon-btn i { width: 20px; height: 20px; }

    .alert-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      background: var(--error);
      border-radius: 50%;
      font-size: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      animation: alertPulse 2s infinite;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-left: 8px;
    }

    .user-info:hover { background: var(--bg-card-hover); }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: white;
    }

    .user-details { display: flex; flex-direction: column; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .user-role { font-size: 11px; color: var(--text-muted); }

    /* Role Switcher */
    .role-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .role-switcher:hover { border-color: var(--border-color-hover); }

    .role-switcher i { width: 16px; height: 16px; color: var(--accent-purple); }

    .role-switcher-text { font-size: 13px; color: var(--text-secondary); }

    /* Dashboard Content removed — panels are now grid children */

    /* Metrics Strip — inside top panel */
    .metrics-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 12px 16px;
    }

    .metric-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .metric-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-color-hover);
      transform: translateY(-2px);
    }

    .metric-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .metric-label { font-size: 13px; color: var(--text-muted); }

    .metric-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .metric-icon.blue { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
    .metric-icon.green { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .metric-icon.red { background: rgba(239, 68, 68, 0.15); color: var(--error); }
    .metric-icon.amber { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .metric-icon i { width: 18px; height: 18px; }

    .metric-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .metric-trend { display: flex; align-items: center; gap: 8px; }

    .trend-badge {
      font-size: 12px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .trend-badge.up { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .trend-badge.down { background: rgba(239, 68, 68, 0.15); color: var(--error); }

    .trend-text { font-size: 12px; color: var(--text-muted); }

    .sparkline {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 24px;
      margin-top: 8px;
    }

    .sparkline-bar {
      width: 4px;
      background: var(--accent-blue);
      border-radius: 2px;
      opacity: 0.6;
    }

    .sparkline-bar:nth-child(1) { height: 40%; }
    .sparkline-bar:nth-child(2) { height: 60%; }
    .sparkline-bar:nth-child(3) { height: 35%; }
    .sparkline-bar:nth-child(4) { height: 80%; }
    .sparkline-bar:nth-child(5) { height: 55%; }
    .sparkline-bar:nth-child(6) { height: 70%; }
    .sparkline-bar:nth-child(7) { height: 100%; }

    /* Progress Bar */
    .progress-container { margin-top: 8px; }

    .progress-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .progress-label { font-size: 12px; color: var(--text-muted); }
    .progress-value { font-size: 12px; color: var(--text-secondary); font-weight: 500; }

    .progress-bar {
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-gradient);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* Two Column Layout removed — now using .workbench-main 3-col grid */

    .card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .card-title { display: flex; flex-direction: column; }
    .card-title-main { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .card-title-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .card-badge {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 10px;
    }

    .card-body { padding: 20px; }

    .card-actions { display: flex; gap: 8px; }

    .card-action-btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-secondary);
    }

    .card-action-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }

    /* AI Conversation Panel — inside workbench-center */
    .conversation-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .conversation-messages {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
    }

    .message { margin-bottom: 16px; }
    .message.user,
    .message.message-user { display: flex; justify-content: flex-end; }

    .message-bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
    }

    .message.user .message-bubble,
    .message.message-user .message-bubble {
      background: var(--accent-gradient);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.ai .message-bubble,
    .message.message-bot .message-bubble {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    .scenario-rail {
      display: flex;
      gap: 8px;
      padding: 12px 20px 0;
      overflow-x: auto;
      flex-shrink: 0;
    }

    .scenario-chip {
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-secondary);
      border-radius: 8px;
      padding: 8px 10px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .scenario-chip:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.06);
    }

    .scenario-chip i {
      width: 14px;
      height: 14px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12);
    }

    /* AI Response Card */
    .ai-response-card {
      background: rgba(59, 130, 246, 0.05);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: 12px;
      padding: 16px;
      margin-top: 12px;
    }

    .ai-response-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .ai-response-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }

    .stage-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .stage-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.5s infinite;
    }

    /* Pipeline Visualization */
    .pipeline-viz { margin: 16px 0; }

    .pipeline-stage {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .pipeline-node {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .pipeline-node.completed { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .pipeline-node.current {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .pipeline-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .pipeline-node.current .pipeline-dot { animation: pulse 1s infinite; }

    .pipeline-arrow { color: var(--text-muted); font-size: 16px; }

    /* Blocker */
    .blocker-card {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
    }

    .blocker-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blocker-icon i { width: 16px; height: 16px; }

    .blocker-content { flex: 1; }
    .blocker-title { font-size: 13px; font-weight: 500; color: var(--warning); }
    .blocker-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .assignees { display: flex; gap: -8px; margin-top: 12px; }

    .assignee {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: white;
      border: 2px solid var(--bg-primary);
      margin-left: -8px;
    }

    .assignee:first-child { margin-left: 0; }

    .action-buttons { display: flex; gap: 8px; margin-top: 12px; }

    .action-btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .action-btn.primary { background: var(--accent-gradient); color: white; }
    .action-btn.primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .action-btn.secondary {
      background: var(--bg-card-hover);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .action-btn.secondary:hover { background: var(--bg-tertiary); color: var(--text-primary); }

    /* Execution Card */
    .execution-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 16px;
      margin-top: 12px;
    }

    .execution-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .execution-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(59, 130, 246, 0.3);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .execution-title { font-size: 13px; font-weight: 500; color: var(--text-primary); }

    .execution-steps { display: flex; flex-direction: column; gap: 10px; }

    .execution-step {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .step-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
    .step-icon.check { color: var(--success); }
    .step-icon.progress { color: var(--accent-blue); }
    .step-icon.pending { color: var(--text-muted); }
    .step-icon i { width: 14px; height: 14px; }

    .step-text { flex: 1; }
    .step-text span { color: var(--text-muted); margin-left: 6px; }

    .execution-progress { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }

    .execution-progress-text { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }

    .execution-progress-bar {
      height: 4px;
      background: var(--bg-tertiary);
      border-radius: 2px;
      overflow: hidden;
    }

    .execution-progress-fill {
      height: 100%;
      background: var(--accent-gradient);
      border-radius: 2px;
      width: 40%;
      transition: width 0.5s ease;
    }

    /* Conversation Input */
    .conversation-input {
      padding: 16px 20px;
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0 16px;
      height: 42px;
      transition: all 0.2s ease;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .input-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 13px;
    }

    .input-wrapper input::placeholder { color: var(--text-muted); }

    .input-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s ease;
    }

    .input-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .input-btn i { width: 18px; height: 18px; }

    .send-btn {
      width: 42px;
      height: 42px;
      background: var(--accent-gradient);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      transition: all 0.2s ease;
    }

    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--glow-blue); }
    .send-btn i { width: 18px; height: 18px; }

    /* Right Column removed — now .workbench-right */

    /* Alerts Panel */
    .alerts-panel { flex: 1; }
    .alerts-list { display: flex; flex-direction: column; gap: 12px; }

    .alert-card {
      background: var(--bg-secondary);
      border-radius: 10px;
      padding: 14px;
      border-left: 3px solid;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .alert-card:hover { background: var(--bg-card-hover); }
    .alert-card.critical { border-left-color: var(--error); }
    .alert-card.warning { border-left-color: var(--warning); }
    .alert-card.info { border-left-color: var(--info); }

    .alert-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .alert-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }

    .alert-type {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .alert-type.critical { background: rgba(239, 68, 68, 0.15); color: var(--error); }
    .alert-type.warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .alert-type.info { background: rgba(6, 182, 212, 0.15); color: var(--info); }

    .alert-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
    .alert-actions { display: flex; gap: 8px; }

    .alert-btn {
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .alert-btn.view { background: var(--bg-card-hover); color: var(--text-secondary); }
    .alert-btn.handle { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
    .alert-btn:hover { opacity: 0.8; }

    /* Agent Collaboration Panel */
    .collaboration-panel { flex: 1; }

    .task-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }

    .task-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(139, 92, 246, 0.15);
      color: var(--accent-purple);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .task-icon i { width: 18px; height: 18px; }
    .task-info { flex: 1; }
    .task-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .task-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .agent-pipeline { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 16px 0; }

    .agent-node { display: flex; flex-direction: column; align-items: center; gap: 4px; }

    .agent-node-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      border: 2px solid;
      transition: all 0.3s ease;
    }

    .agent-node-circle.completed { background: rgba(16, 185, 129, 0.15); border-color: var(--success); color: var(--success); }
    .agent-node-circle.current {
      background: rgba(59, 130, 246, 0.15);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      box-shadow: 0 0 20px var(--glow-blue);
      animation: currentAgent 2s infinite;
    }
    .agent-node-circle.pending { background: var(--bg-card-hover); border-color: var(--border-color); color: var(--text-muted); }

    .agent-node-label { font-size: 9px; color: var(--text-muted); text-align: center; max-width: 50px; }
    .agent-arrow { color: var(--text-muted); font-size: 16px; }

    .agent-current-status { background: var(--bg-secondary); border-radius: 8px; padding: 12px; text-align: center; }
    .agent-current-text { font-size: 12px; color: var(--accent-blue); }

    .agent-progress { margin-top: 12px; display: flex; align-items: center; gap: 12px; }

    .agent-progress-bar {
      flex: 1;
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
    }

    .agent-progress-fill {
      height: 100%;
      background: var(--accent-gradient);
      border-radius: 3px;
      width: 40%;
    }

    .agent-progress-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    .collab-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 14px 0;
    }

    .collab-summary-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 9px 10px;
      min-width: 0;
    }

    .collab-summary-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .collab-summary-value {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .collab-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
    }

    .collab-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .agent-roster {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .agent-roster-row {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-radius: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
    }

    .agent-avatar-mini {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      background: var(--accent-gradient);
      font-size: 11px;
      font-weight: 700;
    }

    .agent-roster-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-roster-task {
      font-size: 11px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 2px;
    }

    .agent-roster-status {
      font-size: 10px;
      padding: 3px 7px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .agent-roster-status.running { background: rgba(59, 130, 246, 0.12); color: var(--accent-blue); }
    .agent-roster-status.done { background: rgba(16, 185, 129, 0.12); color: var(--success); }
    .agent-roster-status.waiting { background: rgba(245, 158, 11, 0.12); color: var(--warning); }

    .handoff-list,
    .collab-output-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .handoff-item,
    .collab-output-item {
      display: flex;
      gap: 8px;
      padding: 8px 0;
    }

    .handoff-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      background: var(--accent-blue);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      flex-shrink: 0;
    }

    .handoff-title,
    .collab-output-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .handoff-meta,
    .collab-output-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      line-height: 1.4;
    }

    .collab-risk-card {
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.22);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--warning);
      font-size: 12px;
      line-height: 1.45;
    }

    /* Pipeline Visualization — inside bottom-history-panel */
    .pipeline-full { max-height: 256px; overflow-y: auto; border: 0; border-radius: 0; }

    .bottom-expanded-content {
      height: calc(300px - 44px);
      overflow-y: auto;
      padding: 12px 16px 16px;
    }

    .history-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .history-summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 12px;
      min-width: 0;
    }

    .history-summary-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .history-summary-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pipeline-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .pipeline-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }

    .pipeline-filters {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
    }

    .filter-btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
    }

    .filter-btn.active { background: var(--accent-gradient); color: white; }
    .filter-btn:hover:not(.active) { color: var(--text-primary); }

    .pipeline-stages {
      display: flex;
      align-items: flex-start;
      gap: 0;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      overflow-x: auto;
    }

    .stage-item {
      flex: 1;
      min-width: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .stage-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
      transition: all 0.3s ease;
    }

    .stage-circle.healthy { background: rgba(16, 185, 129, 0.15); border: 2px solid var(--success); color: var(--success); }
    .stage-circle.warning { background: rgba(245, 158, 11, 0.15); border: 2px solid var(--warning); color: var(--warning); }
    .stage-circle.error { background: rgba(239, 68, 68, 0.15); border: 2px solid var(--error); color: var(--error); }

    .stage-count { font-size: 18px; font-weight: 700; }
    .stage-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); text-align: center; }

    .stage-connector {
      position: absolute;
      top: 28px;
      left: calc(50% + 28px);
      width: calc(100% - 56px);
      height: 2px;
      z-index: 0;
    }

    .stage-connector-line { height: 2px; background: var(--border-color); position: relative; }

    .stage-connector-line::after {
      content: '';
      position: absolute;
      right: -6px;
      top: -4px;
      width: 0;
      height: 0;
      border-left: 8px solid var(--border-color);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
    }

    .stage-connector-line.active { background: var(--success); }
    .stage-connector-line.active::after { border-left-color: var(--success); }

    /* Timeline */
    .pipeline-timeline { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-color); }

    .timeline-header { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 16px; }

    .timeline-events {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .timeline-event {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 220px;
      max-width: 320px;
      white-space: nowrap;
    }

    .event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .event-dot.success { background: var(--success); }
    .event-dot.warning { background: var(--warning); }
    .event-dot.error { background: var(--error); }
    .event-dot.info { background: var(--info); }

    .event-text { font-size: 11px; color: var(--text-secondary); }
    .event-time { font-size: 10px; color: var(--text-muted); margin-left: 4px; }

    /* Command Deck — compact chips inside workbench-center */
    .command-deck { padding: 8px 12px 0; }

    .command-deck-header {
      display: none;
    }

    .command-deck-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }

    .command-chips { display: flex; gap: 8px; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; }

    .command-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      flex: 0 0 auto;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .command-chip:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-blue);
      transform: translateY(-2px);
    }

    .command-chip-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .command-chip-icon i { width: 16px; height: 16px; }

    .command-chip-text { font-size: 13px; color: var(--text-primary); }
    .command-chip-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* Footer Status Bar — inside workbench shell */
    /* .footer-status styles are already defined in workbench shell section above */

    .status-left { display: flex; align-items: center; gap: 20px; }
    .status-item { display: flex; align-items: center; gap: 6px; }

    .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-dot.green { background: var(--success); box-shadow: 0 0 6px var(--success); }

    .status-right { font-size: 11px; }

    /* Animations */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
    @keyframes alertPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes currentAgent { 0%, 100% { box-shadow: 0 0 20px var(--glow-blue); } 50% { box-shadow: 0 0 30px var(--glow-blue), 0 0 40px var(--glow-purple); } }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; padding: 8px 0; align-items: center; }
    .typing-dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.3; } 30% { transform: translateY(-6px); opacity: 1; } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.25); }

    /* Chat message animation */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message { animation: fadeIn 0.3s ease; }

    /* Toast alert */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 13px;
      color: var(--text-primary);
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      animation: toastIn 0.3s ease;
    }

    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    .story-overlay {

      top: 0;

      right: 0;

      'click:quick_cmd:健康检查': { type: 'toast', title_zh: '快捷命令: 健康检查', data: {} },
      'click:quick_cmd:回滚操作': { type: 'modal', title_zh: '回滚操作', data: {} },
      'click:quick_cmd:规范文档': { type: 'drawer', title_zh: '规范文档', data: { view: 'docs' } },
      'click:architecture:view': { type: 'toast', title_zh: '架构视图', data: { view: 'architecture' } },
    };

    // Toolchain data from registry
    const TOOLCHAIN = [
      { id: 'requirement_platform', name: '需求管理平台', status: 'connected' },
      { id: 'design_collaboration', name: '设计协作平台', status: 'connected' },
      { id: 'code_repository', name: '代码托管平台', status: 'connected' },
      { id: 'code_quality', name: '代码质量平台', status: 'connected' },
      { id: 'build_engine', name: '持续集成平台', status: 'delayed' },
      { id: 'test_platform', name: '测试管理平台', status: 'connected' },
      { id: 'artifact_registry', name: '制品管理平台', status: 'connected' },
      { id: 'deployment_platform', name: '发布部署平台', status: 'connected' },
      { id: 'observability_platform', name: '监控观测平台', status: 'connected' },
      { id: 'alert_channel', name: '告警通知平台', status: 'connected' }
    ];

    const CONVERSATION_LIST = [
      { id: 'login-risk', title: '登录优化风险巡检', meta: 'REQ-2024-0892 · 设计评审', time: '10:32', status: '进行中' },
      { id: 'release-gate', title: '发布门禁检查', meta: '订单服务 · 预发布', time: '09:48', status: '待确认' },
      { id: 'incident-followup', title: '延迟告警跟进', meta: '监控观测 · P1 降级', time: '09:12', status: '跟进中' },
      { id: 'sprint-sync', title: 'Sprint 进度同步', meta: '研发团队 · 14 个事项', time: '昨日', status: '已归档' }
    ];

    const COLLAB_AGENTS = [
      { name: '需求分析 Agent', short: '需', task: '补齐验收条件与边界场景', status: 'done', statusText: '已完成' },
      { name: '方案设计 Agent', short: '设', task: '生成 C4 视图与接口草案', status: 'running', statusText: '工作中' },
      { name: '风险检查 Agent', short: '检', task: '等待设计产物后做一致性检查', status: 'waiting', statusText: '排队' },
      { name: '文档整理 Agent', short: '文', task: '整理评审摘要与变更清单', status: 'waiting', statusText: '待启动' }
    ];

    const COLLAB_HANDOFFS = [
      { title: '需求 → 设计', meta: '已输出用户登录、二维码确认、异常重试 3 组场景' },
      { title: '设计 → 检查', meta: '接口契约草案生成中，预计 6 分钟后交接' },
      { title: '检查 → 文档', meta: '将自动生成评审摘要、风险清单和待办分配' }
    ];

    const COLLAB_OUTPUTS = [
      { title: '接口草案', meta: '5 个 API，含错误码和幂等策略' },
      { title: '架构视图', meta: '登录链路、认证服务、通知服务依赖图' },
      { title: '评审清单', meta: '安全、可观测、回滚、兼容性 4 类检查项' }
    ];

    function showToast(message) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function App() {
      const [messages, setMessages] = useState([]);
      const [inputValue, setInputValue] = useState('');
      const [stats, setStats] = useState(null);
      const [executions, setExecutions] = useState({});
      const [isTyping, setIsTyping] = useState(false);
      const [connected, setConnected] = useState(false);
      const [activeRole, setActiveRole] = useState('development');
      const [drawerPanel, setDrawerPanel] = useState({ open: false, title: '', data: {} });
      const [modalPanel, setModalPanel] = useState({ open: false, title: '', data: {} });
      const [isStoryModeOpen, setIsStoryModeOpen] = useState(false);
      const [currentStory, setCurrentStory] = useState(null);
      const [currentStep, setCurrentStep] = useState(0);
      const [storyEvents, setStoryEvents] = useState([]);
      const [highlightedElement, setHighlightedElement] = useState(null);
      const [isArchitectureOpen, setIsArchitectureOpen] = useState(false);
      const [rightTab, setRightTab] = useState('context');
      const [topExpanded, setTopExpanded] = useState(false);
      const [bottomExpanded, setBottomExpanded] = useState(false);
      const [leftExpanded, setLeftExpanded] = useState(true);
      const [rightExpanded, setRightExpanded] = useState(true);
      const [titlebarExpanded, setTitlebarExpanded] = useState(true);
      const messagesEndRef = useRef(null);

      useEffect(() => {
        socket.on('connect', () => {
          setConnected(true);
          socket.emit('get_stats');
        });

        socket.on('disconnect', () => {
          setConnected(false);
        });

        socket.on('stats_update', (data) => {
          setStats(data);
        });

        socket.on('bot_response', (data) => {
          setIsTyping(false);
          if (data.type === 'confirmation') {
            const msgId = 'msg_' + Date.now();
            setMessages(prev => [...prev, {
              id: msgId,
              type: 'bot',
              content: data.message,
              confirmation: data.data,
              msgType: 'confirmation'
            }]);
          } else if (data.type === 'execution_start') {
            const execId = 'exec_' + Date.now();
            const msgId = 'msg_' + Date.now();
            setExecutions(prev => ({
              ...prev,
              [execId]: {
                id: execId,
                message: data.message,
                steps: data.steps || Object.keys(STEP_LABELS).map(key => ({ name: key, status: 'pending' })),
                status: 'running'
              }
            }));
            setMessages(prev => [...prev, {
              id: msgId,
              type: 'bot',
              content: data.message,
              executionId: execId,
              msgType: 'execution'
            }]);
          } else {
            const msgId = 'msg_' + Date.now();
            setMessages(prev => [...prev, { id: msgId, type: 'bot', content: data.message, msgType: 'text' }]);
          }
        });

        socket.on('step_update', (data) => {
          setExecutions(prev => {
            const execId = Object.keys(prev).find(id => prev[id].status === 'running');
            if (!execId) return prev;

            const updated = { ...prev };
            const execution = { ...updated[execId] };
            const steps = execution.steps.map(s =>
              s.name === data.step ? { ...s, status: data.status, message: data.message } : s
            );
            execution.steps = steps;
            updated[execId] = execution;
            return updated;
          });
        });

        socket.on('execution_complete', (data) => {
          setExecutions(prev => {
            const execId = Object.keys(prev).find(id => prev[id].status === 'running');
            if (!execId) return prev;
            return { ...prev, [execId]: { ...prev[execId], status: data.success ? 'completed' : 'failed', result: data } };
          });
          socket.emit('get_stats');
        });

        // Demo interaction handler
        socket.on('demo_interaction', (data) => {
          showToast(data.message || '交互响应: ' + JSON.stringify(data));
        });

        // Story event handler
        socket.on('story_event', (data) => {
          setStoryEvents(prev => [...prev.slice(-4), data]);
        });

        return () => {
          socket.off('connect');
          socket.off('disconnect');
          socket.off('stats_update');
          socket.off('bot_response');
          socket.off('step_update');
          socket.off('execution_complete');
          socket.off('demo_interaction');
          socket.off('story_event');
        };
      }, []);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const appendScenarioConversation = useCallback((scenario) => {
        const now = Date.now();
        const execId = `demo_exec_${scenario.id}_${now}`;
        setMessages(prev => [
          ...prev,
          { id: `demo_user_${now}`, type: 'user', content: scenario.prompt, msgType: 'text' },
          { id: `demo_reply_${now}`, type: 'bot', content: scenario.reply, msgType: 'text' },
          { id: `demo_exec_msg_${now}`, type: 'bot', content: scenario.execution.message, executionId: execId, msgType: 'execution' }
        ]);
        setExecutions(prev => ({
          ...prev,
          [execId]: {
            id: execId,
            message: scenario.execution.message,
            steps: scenario.execution.steps,
            status: 'running'
          }
        }));
        setIsTyping(false);

        window.setTimeout(() => {
          setExecutions(prev => {
            const current = prev[execId];
            if (!current) return prev;
            return {
              ...prev,
              [execId]: {
                ...current,
                steps: current.steps.map(step => step.status === 'running' ? { ...step, status: 'completed', message: step.message || '已完成' } : step),
                status: 'completed'
              }
            };
          });
        }, 2200);
      }, []);

      const findScenarioForMessage = useCallback((message) => {
        const normalized = message.trim();
        if (/风险|发布|巡检/.test(normalized)) return DEMO_SCENARIOS[1];
        if (/告警|故障|payment-service|催办/.test(normalized)) return DEMO_SCENARIOS[2];
        if (/需求|设计|REQ|评审/.test(normalized)) return DEMO_SCENARIOS[0];
        return null;
      }, []);

      const handleSend = useCallback(() => {
        if (!inputValue.trim()) return;
        const message = inputValue.trim();

        // Handle architecture view command locally
        if (message.includes('展示系统架构') || message.includes('系统架构') || message.includes('架构视图')) {
          setMessages(prev => [...prev, { id: 'msg_' + Date.now(), type: 'user', content: message, msgType: 'text' }]);
          setIsArchitectureOpen(true);
          setInputValue('');
          return;
        }

        const scenario = findScenarioForMessage(message);
        if (scenario) {
          setInputValue('');
          appendScenarioConversation({ ...scenario, prompt: message });
          return;
        }

        setMessages(prev => [...prev, { id: 'msg_' + Date.now(), type: 'user', content: message, msgType: 'text' }]);
        setIsTyping(true);
        window.setTimeout(() => {
          setIsTyping(false);
          setMessages(prev => [...prev, {
            id: 'msg_' + Date.now(),
            type: 'bot',
            content: `收到：“${message}”。我已进入对话工作台，可继续输入需求、告警、发布风险或服务检查类指令。`,
            msgType: 'text'
          }]);
        }, 700);
        if (socket && socket.connected) {
          socket.emit('user_message', { message });
        }
        setInputValue('');
      }, [appendScenarioConversation, findScenarioForMessage, inputValue]);

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      };

      const handleQuickCmd = (message) => {
        const scenario = findScenarioForMessage(message);
        if (scenario) {
          appendScenarioConversation({ ...scenario, prompt: message });
          return;
        }
        setMessages(prev => [...prev, { id: 'msg_' + Date.now(), type: 'user', content: message, msgType: 'text' }]);
        setIsTyping(true);
        if (socket && socket.connected) {
          socket.emit('user_message', { message });
        }
      };

      const handleConfirm = (data) => {
        socket.emit('confirm_deploy', { service: data.service, version: data.version, environment: data.environment });
      };

      const handleNavClick = (section) => {
        showToast('导航: ' + section);
        socket.emit('demo_interaction', { interactionId: `click:sidebar:nav:${section}` });
      };

      const handleRoleChange = (roleId) => {
        setActiveRole(roleId);
        const role = ROLES.find(r => r.id === roleId);
        showToast('切换角色: ' + (role ? role.name_zh : roleId));
        socket.emit('demo_interaction', { interactionId: `click:sidebar:role:${roleId}` });
      };

      const handleToolClick = (toolName) => {
        showToast('工具: ' + toolName);
        socket.emit('demo_interaction', { interactionId: `click:sidebar:tool:${toolName}` });
      };

      const handleAlertClick = (alertTitle) => {
        showToast('告警: ' + alertTitle);
        socket.emit('demo_interaction', { interactionId: `click:alerts:${alertTitle}` });
      };

      const handleMetricClick = (metricName) => {
        showToast('指标: ' + metricName);
        socket.emit('demo_interaction', { interactionId: `click:metric:${metricName}` });
      };

      const handleStageClick = (stageName) => {
        showToast('流程阶段: ' + stageName);
        socket.emit('demo_interaction', { interactionId: `click:pipeline:stage:${stageName}` });
      };

      const handleAgentNodeClick = (agentName) => {
        showToast('智能体: ' + agentName);
        socket.emit('demo_interaction', { interactionId: `click:agent:${agentName}` });
      };

      const handleSidebarAgentClick = (agentName) => {
        showToast('智能体详情: ' + agentName);
        socket.emit('demo_interaction', { interactionId: `click:sidebar:agent:${agentName}` });
      };

      const handleSearchSubmit = (query) => {
        if (query.trim()) {
          showToast('搜索: ' + query);
          socket.emit('demo_interaction', { interactionId: 'click:search:submit' });
        }
      };

      const handleMicClick = () => {
        showToast('语音输入');
        socket.emit('demo_interaction', { interactionId: 'click:input:mic' });
      };

      const handleFooterStatusClick = (statusType) => {
        showToast('状态: ' + statusType);
        socket.emit('demo_interaction', { interactionId: `click:footer:${statusType}` });
      };

      const handleNoticeClick = () => {
        showToast('通知面板');
        socket.emit('demo_interaction', { interactionId: 'click:notifica' + 'tion:bell' });
      };

      const handleSettingsClick = () => {
        showToast('设置');
        socket.emit('demo_interaction', { interactionId: 'click:topnav:settings' });
      };

      const handleUserMenuClick = () => {
        showToast('用户菜单');
        socket.emit('demo_interaction', { interactionId: 'click:topnav:user' });
      };

      const handleRoleSwitcherClick = () => {
        showToast('角色列表');
        socket.emit('demo_interaction', { interactionId: 'click:sidebar:role_switcher' });
      };

      const handleSystemSettingsClick = () => {
        showToast('系统设置');
        socket.emit('demo_interaction', { interactionId: 'click:sidebar:system_settings' });
      };

      const handleGenericClick = (interactionId) => {
        const event = INTERACTION_RESPONSES[interactionId] || { type: 'toast', title_zh: '演示交互', data: {} };
        if (event.type === 'toast') {
          showToast(event.title_zh + ' - 演示交互');
        } else if (event.type === 'drawer') {
          setDrawerPanel({ open: true, title: event.title_zh, data: event.data });
        } else if (event.type === 'modal') {
          setModalPanel({ open: true, title: event.title_zh, data: event.data });
        }
        if (socket && socket.connected) {
          socket.emit('demo_interaction', { interactionId });
        }
      };

      const handleCommandChip = (chipText) => {
        const interactionId = 'click:quick_cmd:' + chipText;
        handleGenericClick(interactionId);
        handleQuickCmd(chipText);
      };

      const handleStoryModeOpen = () => {
        setIsStoryModeOpen(true);
        setCurrentStory(null);
        setCurrentStep(0);
        setStoryEvents([]);
        setHighlightedElement(null);
      };

      const handleStoryModeClose = () => {
        setIsStoryModeOpen(false);
        setCurrentStory(null);
        setCurrentStep(0);
        setStoryEvents([]);
        setHighlightedElement(null);
      };

      const handleStartStory = (storyId) => {
        setCurrentStory(storyId);
        setCurrentStep(0);
        setStoryEvents([]);

        const story = STORY_SEQUENCES[storyId];
        if (story && story.steps[0]) {
          const firstStep = story.steps[0];
          // Switch role
          setActiveRole(firstStep.role);
          // Set highlight
          setHighlightedElement({ type: firstStep.highlight, element: firstStep.highlightElement });
          // Emit demo interaction
          socket.emit('demo_interaction', { interactionId: `story:step:${storyId}:${firstStep.step}`, storyId, step: firstStep.step });
          // Emit story event
          socket.emit('story_advance', { storyId, step: firstStep.step, role: firstStep.role });
        }
      };

      const handleStoryNext = () => {
        const story = STORY_SEQUENCES[currentStory];
        if (!story) return;

        if (currentStep < story.steps.length - 1) {
          const nextStep = currentStep + 1;
          setCurrentStep(nextStep);
          const stepData = story.steps[nextStep];

          // Switch role
          setActiveRole(stepData.role);
          // Set highlight
          setHighlightedElement({ type: stepData.highlight, element: stepData.highlightElement });
          // Emit demo interaction
          socket.emit('demo_interaction', { interactionId: `story:step:${currentStory}:${stepData.step}`, storyId: currentStory, step: stepData.step });
          // Emit story event
          socket.emit('story_advance', { storyId: currentStory, step: stepData.step, role: stepData.role });
        } else {
          // Story complete
          handleStoryModeClose();
        }
      };

      const handleStoryPrev = () => {
        if (currentStep > 0) {
          const prevStep = currentStep - 1;
          setCurrentStep(prevStep);
          const stepData = STORY_SEQUENCES[currentStory].steps[prevStep];

          // Switch role
          setActiveRole(stepData.role);
          // Set highlight
          setHighlightedElement({ type: stepData.highlight, element: stepData.highlightElement });
          // Emit demo interaction
          socket.emit('demo_interaction', { interactionId: `story:step:${currentStory}:${stepData.step}`, storyId: currentStory, step: stepData.step });
        }
      };

      const handleStoryExit = () => {
        handleStoryModeClose();
      };

      const handleArchitectureViewOpen = () => {
        setIsArchitectureOpen(true);
      };

      const handleArchitectureViewClose = () => {
        setIsArchitectureOpen(false);
      };

      return (
        <div className={`workbench-shell ${topExpanded ? 'has-top-expanded' : ''} ${bottomExpanded ? 'has-bottom-expanded' : ''} ${leftExpanded ? '' : 'is-left-collapsed'} ${rightExpanded ? '' : 'is-right-collapsed'} ${titlebarExpanded ? '' : 'is-titlebar-collapsed'}`} data-testid="workbench-shell">
          <StoryModeOverlay
            isOpen={isStoryModeOpen}
            onClose={handleStoryModeClose}
            onStartStory={handleStartStory}
            currentStory={currentStory}
            currentStep={currentStep}
            onNext={handleStoryNext}
            onPrev={handleStoryPrev}
            onExit={handleStoryExit}
            storyEvents={storyEvents}
          />

          <ArchitectureView
            isOpen={isArchitectureOpen}
            onClose={handleArchitectureViewClose}
          />

          <button
            className="story-start-btn"
            onClick={handleStoryModeOpen}
            data-testid="story-mode-start"
            style={{ position: 'fixed', bottom: 88, right: 24, zIndex: 500 }}
          >
            <i data-lucide="book-open"></i>
            故事模式
          </button>

          <header className="workbench-titlebar" data-testid="workbench-titlebar">
            <TopNav
              onNavClick={handleNavClick}
              connected={connected}
              activeRole={activeRole}
              onSearchSubmit={handleSearchSubmit}
              onMicClick={handleMicClick}
              onNoticeClick={handleNoticeClick}
              onSettingsClick={handleSettingsClick}
              onUserMenuClick={handleUserMenuClick}
              leftExpanded={leftExpanded}
              rightExpanded={rightExpanded}
              titlebarExpanded={titlebarExpanded}
              onToggleLeft={() => setLeftExpanded(!leftExpanded)}
              onToggleRight={() => setRightExpanded(!rightExpanded)}
              onToggleTitlebar={() => setTitlebarExpanded(!titlebarExpanded)}
            />
          </header>

          <section className={`top-metrics-panel ${topExpanded ? 'is-expanded' : 'is-collapsed'}`} data-testid="top-metrics-panel" aria-label="指标面板">
            <div className="panel-center-rail" data-testid="top-metrics-rail">
              <div className="top-panel-stack" id="top-metrics-content">
                <div className="top-panel-bar">
                <span style={{ fontSize: '12px', fontWeight: 600, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>指标概览</span>
                <button
                  type="button"
                  className="panel-toggle"
                  data-testid="top-metrics-toggle"
                  aria-controls="top-metrics-content"
                  aria-expanded={topExpanded ? 'true' : 'false'}
                  aria-label={topExpanded ? '收起指标面板' : '展开指标面板'}
                  onClick={() => setTopExpanded(!topExpanded)}
                >
                  <span>{topExpanded ? '收起' : '展开'}</span>
                  <i data-lucide={topExpanded ? 'chevron-up' : 'chevron-down'} style={{ width: 14, height: 14 }}></i>
                </button>
                </div>
                <MetricsStrip stats={stats} activeRole={activeRole} />
              </div>
            </div>
          </section>

          <main className="workbench-main" data-testid="workbench-main">
            <aside className="workbench-left" data-testid="workbench-left">
              <Sidebar
                activeRole={activeRole}
                onRoleChange={handleRoleChange}
                onNavClick={handleNavClick}
                onToolClick={handleToolClick}
                onAgentClick={handleSidebarAgentClick}
                onRoleSwitcherClick={handleRoleSwitcherClick}
                onSystemSettingsClick={handleSystemSettingsClick}
                onArchitectureViewOpen={handleArchitectureViewOpen}
              />
            </aside>

            <section className="workbench-center" data-testid="workbench-center">
              <div className="card conversation-panel">
                <div className="card-header" data-testid="chat-header">
                  <div className="card-title">
                    <span className="card-title-sub">对话工作台</span>
                    <span className="card-title-main" data-testid="dashboard-headline">{ROLE_CONTENT[activeRole]?.headline || 'AI 智能中枢'}</span>
                    <span className="card-title-sub" data-testid="dashboard-headline-sub">{ROLE_CONTENT[activeRole]?.headlineSub || '通过对话驱动全流程'}</span>
                  </div>
                  <div className="card-actions">
                    <button className="card-action-btn" onClick={() => showToast('新建对话')}>新建对话</button>
                    <button className="card-action-btn" onClick={() => showToast('历史记录')}>历史记录</button>
                  </div>
                </div>
                <div className="scenario-rail" data-testid="scenario-rail" aria-label="对话场景">
                  {DEMO_SCENARIOS.map((scenario) => (
                    <button
                      type="button"
                      key={scenario.id}
                      className="scenario-chip"
                      data-testid={`scenario-chip-${scenario.id}`}
                      onClick={() => appendScenarioConversation(scenario)}
                    >
                      <span className="live-dot" aria-hidden="true"></span>
                      <i data-lucide={scenario.icon}></i>
                      {scenario.label}
                    </button>
                  ))}
                </div>
                <div className="conversation-messages">
                  <div className="message message-bot">
                    <div className="message-bubble">{WELCOME_MESSAGE}</div>
                  </div>

                  {messages.map((msg) => (
                    <Message
                      key={msg.id}
                      {...msg}
                      executions={executions}
                      onConfirm={handleConfirm}
                      onQuickCmd={handleQuickCmd}
                    />
                  ))}

                  {isTyping && (
                    <div className="message message-bot">
                      <div className="message-bubble">

      return (
        <div className="metrics-strip" data-testid="metrics-strip">

            const metric = defaultMetric[key];

            return (
              <div className="metric-card" key={key} data-testid={`metric-card-${key}`}>
                <div className="metric-header">
                  <span className="metric-label">{metric.label}</span>

                  </div>
                )}

            );
          })}

      );

                              <span className={`story-event-dot ${evt.severity?.toLowerCase() || 'info'}`}></span>
                              <span className="story-event-text">{evt.message}</span>
                              <span className="story-event-time">{new Date(evt.timestamp).toLocaleTimeString()}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
              <div className="story-controls">
                <button
                  className="story-btn story-btn-prev"
                  onClick={onPrev}
                  disabled={currentStep === 0}
                  data-testid="story-mode-prev-btn"
                >
                  <span className="story-icon" aria-hidden="true">{storyIconGlyph('chevron-left')}</span>
                  上一步
                </button>
                <button
                  className="story-btn story-btn-next"
                  onClick={onNext}
                  data-testid="story-mode-next-btn"
                >
                  {currentStep === totalSteps - 1 ? '完成' : '下一步'}
                  <span className="story-icon" aria-hidden="true">{storyIconGlyph(currentStep === totalSteps - 1 ? 'check' : 'chevron-right')}</span>
                </button>
                <button
                  className="story-btn story-btn-exit"
                  onClick={onExit}
                  data-testid="story-mode-exit-btn"
                >
                  <span className="story-icon" aria-hidden="true">{storyIconGlyph('x')}</span>
                  退出
                </button>
              </div>
            </div>
          </div>
        );
      }

      // Story selection view
      return (
        <div className="story-overlay">
          <div className="story-modal">
            <div className="story-modal-header">
              <div className="story-modal-title">
                <span className="story-icon" aria-hidden="true">{storyIconGlyph('sparkles')}</span>

              </div>
              <button className="story-close-btn" onClick={onClose} data-testid="story-mode-close-btn">

              </button>
            </div>
            <div className="story-modal-body">
              <div className="story-storylines">
                {Object.entries(STORY_SEQUENCES).map(([id, story]) => (
                  <div
                    key={id}
                    className={`storyline-card ${selectedStory === id ? 'selected' : ''}`}
                    onClick={() => handleStorySelect(id)}
                  >
                    <div className="storyline-icon">

                    </div>
                    <div className="storyline-title">{story.title}</div>
                    <div className="storyline-desc">{story.desc}</div>
                    <div className="storyline-roles">
                      {story.roles.map(r => {
                        const role = ROLES.find(rl => rl.id === r);
                        return (
                          <span key={r} className="storyline-role-tag">
                            {role?.name_zh || r}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="story-controls">
              <button
                className="story-btn story-btn-next"
                onClick={handleStartFromSelection}
                disabled={!selectedStory}
                data-testid="story-mode-start-btn"
              >
                开始演示

              </button>
              <button
                className="story-btn story-btn-exit"
                onClick={onClose}
                data-testid="story-mode-cancel-btn"
              >
                取消
              </button>
            </div>
          </div>
        </div>
      );
    }
