<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentCenter - DevOps 智能中枢</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #0c1222;
      --bg-card: rgba(30, 41, 59, 0.7);
      --bg-card-hover: rgba(30, 41, 59, 0.9);
      --border-color: rgba(148, 163, 184, 0.1);
      --border-color-hover: rgba(148, 163, 184, 0.2);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --info: #06b6d4;
      --glow-blue: rgba(59, 130, 246, 0.3);
      --glow-purple: rgba(139, 92, 246, 0.3);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root { height: 100%; }

    .app-container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-gradient);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--glow-blue);
    }

    .logo-icon svg { width: 20px; height: 20px; color: white; }

    .logo-text { font-size: 18px; font-weight: 600; color: var(--text-primary); }

    .version-badge {
      background: var(--bg-tertiary);
      color: var(--accent-blue);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
      font-weight: 500;
    }

    .sidebar-content { flex: 1; overflow-y: auto; padding: 16px 0; }

    .sidebar-section { margin-bottom: 24px; }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 0 20px;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: rgba(59, 130, 246, 0.1);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
      border-left-color: var(--accent-blue);
    }

    .nav-item i { width: 18px; height: 18px; opacity: 0.8; }
    .nav-item span { font-size: 14px; }

    /* Tool Status */
    .tool-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tool-item:hover { background: rgba(255, 255, 255, 0.03); }

    .tool-info { display: flex; align-items: center; gap: 10px; }

    .tool-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .tool-status-dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .tool-status-dot.delayed { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
    .tool-status-dot.error { background: var(--error); box-shadow: 0 0 8px var(--error); }

    .tool-name { font-size: 13px; color: var(--text-secondary); }
    .tool-status-text { font-size: 11px; color: var(--text-muted); }

    /* Agent Status */
    .agent-item {
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .agent-item:hover { background: rgba(255, 255, 255, 0.03); }

    .agent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .agent-name { font-size: 13px; color: var(--text-secondary); }

    .agent-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .agent-status.idle { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .agent-status.working { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
    .agent-status.alert { background: rgba(245, 158, 11, 0.15); color: var(--warning); animation: alertPulse 1.5s infinite; }

    .agent-status .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .agent-status.working .dot { animation: breathe 1.5s infinite; }

    .agent-task { font-size: 11px; color: var(--text-muted); margin-left: 18px; }

    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border-color); }

    .system-settings {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      padding: 8px 0;
      transition: color 0.2s ease;
    }

    .system-settings:hover { color: var(--text-primary); }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 260px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top Navigation */
    .top-nav {
      height: 60px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .nav-left { display: flex; align-items: center; gap: 16px; }

    .collapse-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }

    .collapse-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }

    .nav-center { flex: 1; max-width: 480px; margin: 0 40px; }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0 16px;
      height: 40px;
      transition: all 0.2s ease;
    }

    .search-bar:focus-within {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .search-bar i { color: var(--text-muted); width: 18px; height: 18px; }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 14px;
      margin-left: 10px;
    }

    .search-bar input::placeholder { color: var(--text-muted); }

    .nav-right { display: flex; align-items: center; gap: 8px; }

    .nav-icon-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      position: relative;
    }

    .nav-icon-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }
    .nav-icon-btn i { width: 20px; height: 20px; }

    .alert-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      background: var(--error);
      border-radius: 50%;
      font-size: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      animation: alertPulse 2s infinite;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-left: 8px;
    }

    .user-info:hover { background: rgba(255, 255, 255, 0.05); }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: white;
    }

    .user-details { display: flex; flex-direction: column; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .user-role { font-size: 11px; color: var(--text-muted); }

    /* Role Switcher */
    .role-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .role-switcher:hover { border-color: var(--border-color-hover); }

    .role-switcher i { width: 16px; height: 16px; color: var(--accent-purple); }

    .role-switcher-text { font-size: 13px; color: var(--text-secondary); }

    /* Dashboard Content */
    .dashboard-content {
      flex: 1;
      padding: 24px;
      background: var(--bg-primary);
    }

    /* Metrics Strip */
    .metrics-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .metric-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-color-hover);
      transform: translateY(-2px);
    }

    .metric-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .metric-label { font-size: 13px; color: var(--text-muted); }

    .metric-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .metric-icon.blue { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
    .metric-icon.green { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .metric-icon.red { background: rgba(239, 68, 68, 0.15); color: var(--error); }
    .metric-icon.amber { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .metric-icon i { width: 18px; height: 18px; }

    .metric-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .metric-trend { display: flex; align-items: center; gap: 8px; }

    .trend-badge {
      font-size: 12px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .trend-badge.up { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .trend-badge.down { background: rgba(239, 68, 68, 0.15); color: var(--error); }

    .trend-text { font-size: 12px; color: var(--text-muted); }

    .sparkline {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 24px;
      margin-top: 8px;
    }

    .sparkline-bar {
      width: 4px;
      background: var(--accent-blue);
      border-radius: 2px;
      opacity: 0.6;
    }

    .sparkline-bar:nth-child(1) { height: 40%; }
    .sparkline-bar:nth-child(2) { height: 60%; }
    .sparkline-bar:nth-child(3) { height: 35%; }
    .sparkline-bar:nth-child(4) { height: 80%; }
    .sparkline-bar:nth-child(5) { height: 55%; }
    .sparkline-bar:nth-child(6) { height: 70%; }
    .sparkline-bar:nth-child(7) { height: 100%; }

    /* Progress Bar */
    .progress-container { margin-top: 8px; }

    .progress-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .progress-label { font-size: 12px; color: var(--text-muted); }
    .progress-value { font-size: 12px; color: var(--text-secondary); font-weight: 500; }

    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-gradient);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* Two Column Layout */
    .two-column {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .card-title { display: flex; flex-direction: column; }
    .card-title-main { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .card-title-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .card-badge {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 10px;
    }

    .card-body { padding: 20px; }

    .card-actions { display: flex; gap: 8px; }

    .card-action-btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-secondary);
    }

    .card-action-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }

    /* AI Conversation Panel */
    .conversation-panel {
      display: flex;
      flex-direction: column;
      height: 520px;
    }

    .conversation-messages {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
    }

    .message { margin-bottom: 16px; }
    .message.user { display: flex; justify-content: flex-end; }

    .message-bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
    }

    .message.user .message-bubble {
      background: var(--accent-gradient);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.ai .message-bubble {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    /* AI Response Card */
    .ai-response-card {
      background: rgba(59, 130, 246, 0.05);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: 12px;
      padding: 16px;
      margin-top: 12px;
    }

    .ai-response-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .ai-response-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }

    .stage-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .stage-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.5s infinite;
    }

    /* Pipeline Visualization */
    .pipeline-viz { margin: 16px 0; }

    .pipeline-stage {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .pipeline-node {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .pipeline-node.completed { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .pipeline-node.current {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .pipeline-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .pipeline-node.current .pipeline-dot { animation: pulse 1s infinite; }

    .pipeline-arrow { color: var(--text-muted); font-size: 16px; }

    /* Blocker */
    .blocker-card {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
    }

    .blocker-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blocker-icon i { width: 16px; height: 16px; }

    .blocker-content { flex: 1; }
    .blocker-title { font-size: 13px; font-weight: 500; color: var(--warning); }
    .blocker-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .assignees { display: flex; gap: -8px; margin-top: 12px; }

    .assignee {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: white;
      border: 2px solid var(--bg-primary);
      margin-left: -8px;
    }

    .assignee:first-child { margin-left: 0; }

    .action-buttons { display: flex; gap: 8px; margin-top: 12px; }

    .action-btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .action-btn.primary { background: var(--accent-gradient); color: white; }
    .action-btn.primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .action-btn.secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .action-btn.secondary:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }

    /* Execution Card */
    .execution-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 16px;
      margin-top: 12px;
    }

    .execution-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .execution-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(59, 130, 246, 0.3);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .execution-title { font-size: 13px; font-weight: 500; color: var(--text-primary); }

    .execution-steps { display: flex; flex-direction: column; gap: 10px; }

    .execution-step {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .step-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
    .step-icon.check { color: var(--success); }
    .step-icon.progress { color: var(--accent-blue); }
    .step-icon.pending { color: var(--text-muted); }
    .step-icon i { width: 14px; height: 14px; }

    .step-text { flex: 1; }
    .step-text span { color: var(--text-muted); margin-left: 6px; }

    .execution-progress { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }

    .execution-progress-text { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }

    .execution-progress-bar {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .execution-progress-fill {
      height: 100%;
      background: var(--accent-gradient);
      border-radius: 2px;
      width: 40%;
      transition: width 0.5s ease;
    }

    /* Conversation Input */
    .conversation-input {
      padding: 16px 20px;
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0 16px;
      height: 42px;
      transition: all 0.2s ease;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .input-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 13px;
    }

    .input-wrapper input::placeholder { color: var(--text-muted); }

    .input-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s ease;
    }

    .input-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }
    .input-btn i { width: 18px; height: 18px; }

    .send-btn {
      width: 42px;
      height: 42px;
      background: var(--accent-gradient);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      transition: all 0.2s ease;
    }

    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--glow-blue); }
    .send-btn i { width: 18px; height: 18px; }

    /* Right Column */
    .right-column { display: flex; flex-direction: column; gap: 24px; }

    /* Alerts Panel */
    .alerts-panel { flex: 1; }
    .alerts-list { display: flex; flex-direction: column; gap: 12px; }

    .alert-card {
      background: var(--bg-secondary);
      border-radius: 10px;
      padding: 14px;
      border-left: 3px solid;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .alert-card:hover { background: rgba(30, 41, 59, 0.9); }
    .alert-card.critical { border-left-color: var(--error); }
    .alert-card.warning { border-left-color: var(--warning); }
    .alert-card.info { border-left-color: var(--info); }

    .alert-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .alert-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }

    .alert-type {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .alert-type.critical { background: rgba(239, 68, 68, 0.15); color: var(--error); }
    .alert-type.warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .alert-type.info { background: rgba(6, 182, 212, 0.15); color: var(--info); }

    .alert-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
    .alert-actions { display: flex; gap: 8px; }

    .alert-btn {
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .alert-btn.view { background: rgba(255, 255, 255, 0.05); color: var(--text-secondary); }
    .alert-btn.handle { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
    .alert-btn:hover { opacity: 0.8; }

    /* Agent Collaboration Panel */
    .collaboration-panel { flex: 1; }

    .task-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }

    .task-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(139, 92, 246, 0.15);
      color: var(--accent-purple);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .task-icon i { width: 18px; height: 18px; }
    .task-info { flex: 1; }
    .task-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .task-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .agent-pipeline { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 16px 0; }

    .agent-node { display: flex; flex-direction: column; align-items: center; gap: 4px; }

    .agent-node-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      border: 2px solid;
      transition: all 0.3s ease;
    }

    .agent-node-circle.completed { background: rgba(16, 185, 129, 0.15); border-color: var(--success); color: var(--success); }
    .agent-node-circle.current {
      background: rgba(59, 130, 246, 0.15);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      box-shadow: 0 0 20px var(--glow-blue);
      animation: currentAgent 2s infinite;
    }
    .agent-node-circle.pending { background: rgba(255, 255, 255, 0.03); border-color: var(--border-color); color: var(--text-muted); }

    .agent-node-label { font-size: 9px; color: var(--text-muted); text-align: center; max-width: 50px; }
    .agent-arrow { color: var(--text-muted); font-size: 16px; }

    .agent-current-status { background: var(--bg-secondary); border-radius: 8px; padding: 12px; text-align: center; }
    .agent-current-text { font-size: 12px; color: var(--accent-blue); }

    .agent-progress { margin-top: 12px; display: flex; align-items: center; gap: 12px; }

    .agent-progress-bar {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .agent-progress-fill {
      height: 100%;
      background: var(--accent-gradient);
      border-radius: 3px;
      width: 40%;
    }

    .agent-progress-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    /* Pipeline Visualization Full Width */
    .pipeline-full { margin-bottom: 24px; }

    .pipeline-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .pipeline-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }

    .pipeline-filters {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
    }

    .filter-btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
    }

    .filter-btn.active { background: var(--accent-gradient); color: white; }
    .filter-btn:hover:not(.active) { color: var(--text-primary); }

    .pipeline-stages {
      display: flex;
      align-items: flex-start;
      gap: 0;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      overflow-x: auto;
    }

    .stage-item {
      flex: 1;
      min-width: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .stage-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
      transition: all 0.3s ease;
    }

    .stage-circle.healthy { background: rgba(16, 185, 129, 0.15); border: 2px solid var(--success); color: var(--success); }
    .stage-circle.warning { background: rgba(245, 158, 11, 0.15); border: 2px solid var(--warning); color: var(--warning); }
    .stage-circle.error { background: rgba(239, 68, 68, 0.15); border: 2px solid var(--error); color: var(--error); }

    .stage-count { font-size: 18px; font-weight: 700; }
    .stage-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); text-align: center; }

    .stage-connector {
      position: absolute;
      top: 28px;
      left: calc(50% + 28px);
      width: calc(100% - 56px);
      height: 2px;
      z-index: 0;
    }

    .stage-connector-line { height: 2px; background: var(--border-color); position: relative; }

    .stage-connector-line::after {
      content: '';
      position: absolute;
      right: -6px;
      top: -4px;
      width: 0;
      height: 0;
      border-left: 8px solid var(--border-color);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
    }

    .stage-connector-line.active { background: var(--success); }
    .stage-connector-line.active::after { border-left-color: var(--success); }

    /* Timeline */
    .pipeline-timeline { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-color); }

    .timeline-header { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 16px; }

    .timeline-events {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .timeline-event { display: flex; align-items: center; gap: 8px; white-space: nowrap; }

    .event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .event-dot.success { background: var(--success); }
    .event-dot.warning { background: var(--warning); }
    .event-dot.error { background: var(--error); }
    .event-dot.info { background: var(--info); }

    .event-text { font-size: 11px; color: var(--text-secondary); }
    .event-time { font-size: 10px; color: var(--text-muted); margin-left: 4px; }

    /* Command Deck */
    .command-deck { margin-bottom: 24px; }

    .command-deck-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .command-deck-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }

    .command-chips { display: flex; gap: 12px; flex-wrap: wrap; }

    .command-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .command-chip:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-blue);
      transform: translateY(-2px);
    }

    .command-chip-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .command-chip-icon i { width: 16px; height: 16px; }

    .command-chip-text { font-size: 13px; color: var(--text-primary); }
    .command-chip-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* Footer Status Bar */
    .footer-status {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-left { display: flex; align-items: center; gap: 20px; }
    .status-item { display: flex; align-items: center; gap: 6px; }

    .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-dot.green { background: var(--success); box-shadow: 0 0 6px var(--success); }

    .status-right { font-size: 11px; }

    /* Animations */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
    @keyframes alertPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes currentAgent { 0%, 100% { box-shadow: 0 0 20px var(--glow-blue); } 50% { box-shadow: 0 0 30px var(--glow-blue), 0 0 40px var(--glow-purple); } }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; padding: 8px 0; align-items: center; }
    .typing-dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.3; } 30% { transform: translateY(-6px); opacity: 1; } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

    /* Chat message animation */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message { animation: fadeIn 0.3s ease; }

    /* Toast alert */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 13px;
      color: var(--text-primary);
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      animation: toastIn 0.3s ease;
    }

    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* Story Mode Overlay */
    .story-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.95);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    .story-modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      width: 90%;
      max-width: 900px;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .story-modal-header {
      padding: 24px 28px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .story-modal-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .story-modal-title i {
      color: var(--accent-blue);
    }

    .story-close-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s ease;
      background: transparent;
      border: none;
    }

    .story-close-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
    }

    .story-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    .story-storylines {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .storyline-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .storyline-card:hover {
      border-color: var(--accent-blue);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.15);
    }

    .storyline-card.selected {
      border-color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.1);
    }

    .storyline-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .storyline-icon i {
      width: 24px;
      height: 24px;
    }

    .storyline-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .storyline-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .storyline-roles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .storyline-role-tag {
      font-size: 10px;
      padding: 3px 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      color: var(--text-secondary);
    }

    .story-step-container {
      background: var(--bg-primary);
      border-radius: 12px;
      padding: 24px;
    }

    .story-step-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .story-step-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .story-step-badge {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: white;
    }

    .story-step-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .story-step-role {
      font-size: 12px;
      color: var(--accent-blue);
      margin-top: 4px;
    }

    .story-step-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    .story-step-content {
      margin-bottom: 20px;
    }

    .story-step-section {
      margin-bottom: 16px;
    }

    .story-step-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .story-step-value {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.6;
    }

    .story-step-highlight {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--accent-blue);
    }

    .story-step-explanation {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
    }

    .story-step-explanation .story-step-label {
      color: var(--success);
    }

    .story-step-explanation .story-step-value {
      color: var(--success);
    }

    .story-controls {
      display: flex;
      gap: 12px;
      padding: 20px 28px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-secondary);
    }

    .story-btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      border: none;
    }

    .story-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .story-btn-prev {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .story-btn-prev:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .story-btn-next {
      background: var(--accent-gradient);
      color: white;
    }

    .story-btn-next:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .story-btn-exit {
      background: transparent;
      color: var(--text-muted);
      margin-left: auto;
      border: 1px solid var(--border-color);
    }

    .story-btn-exit:hover {
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .story-event-feed {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
      max-height: 120px;
      overflow-y: auto;
    }

    .story-event-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .story-event-item:last-child {
      border-bottom: none;
    }

    .story-event-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .story-event-dot.info { background: var(--info); }
    .story-event-dot.success { background: var(--success); }
    .story-event-dot.warning { background: var(--warning); }
    .story-event-dot.error { background: var(--error); }

    .story-event-text {
      color: var(--text-secondary);
      flex: 1;
    }

    .story-event-time {
      color: var(--text-muted);
      font-size: 10px;
    }

    .story-highlight-pulse {
      animation: storyPulse 1.5s ease-in-out infinite;
    }

    @keyframes storyPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
    }

    .story-start-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--accent-gradient);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .story-start-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* Architecture View Overlay */
    .architecture-overlay {
      position: fixed;
      top: 0;
      left: 0;

    };

    // Toolchain data from registry
    const TOOLCHAIN = [
      { id: 'requirement_platform', name: '需求管理平台', status: 'connected' },
      { id: 'design_collaboration', name: '设计协作平台', status: 'connected' },
      { id: 'code_repository', name: '代码仓库', status: 'connected' },
      { id: 'code_quality', name: '代码质量平台', status: 'connected' },
      { id: 'build_engine', name: '构建引擎', status: 'delayed' },
      { id: 'test_platform', name: '测试平台', status: 'connected' },
      { id: 'artifact_registry', name: '制品仓库', status: 'connected' },

    function showToast(message) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function App() {
      const [messages, setMessages] = useState([]);
      const [inputValue, setInputValue] = useState('');
      const [stats, setStats] = useState(null);
      const [executions, setExecutions] = useState({});
      const [isTyping, setIsTyping] = useState(false);
      const [connected, setConnected] = useState(false);
      const [activeRole, setActiveRole] = useState('development');
      const [drawerPanel, setDrawerPanel] = useState({ open: false, title: '', data: {} });
      const [modalPanel, setModalPanel] = useState({ open: false, title: '', data: {} });
      const [isStoryModeOpen, setIsStoryModeOpen] = useState(false);
      const [currentStory, setCurrentStory] = useState(null);
      const [currentStep, setCurrentStep] = useState(0);
      const [storyEvents, setStoryEvents] = useState([]);
      const [highlightedElement, setHighlightedElement] = useState(null);
      const [isArchitectureOpen, setIsArchitectureOpen] = useState(false);
      const messagesEndRef = useRef(null);

      useEffect(() => {
        socket.on('connect', () => {
          setConnected(true);
          socket.emit('get_stats');
        });

        socket.on('disconnect', () => {
          setConnected(false);
        });

        socket.on('stats_update', (data) => {
          setStats(data);
        });

        socket.on('bot_response', (data) => {
          setIsTyping(false);
          if (data.type === 'confirmation') {
            const msgId = 'msg_' + Date.now();
            setMessages(prev => [...prev, {
              id: msgId,
              type: 'bot',
              content: data.message,
              confirmation: data.data,
              msgType: 'confirmation'
            }]);
          } else if (data.type === 'execution_start') {
            const execId = 'exec_' + Date.now();
            const msgId = 'msg_' + Date.now();
            setExecutions(prev => ({
              ...prev,
              [execId]: {
                id: execId,
                message: data.message,
                steps: data.steps || Object.keys(STEP_LABELS).map(key => ({ name: key, status: 'pending' })),
                status: 'running'
              }
            }));
            setMessages(prev => [...prev, {
              id: msgId,
              type: 'bot',
              content: data.message,
              executionId: execId,
              msgType: 'execution'
            }]);
          } else {
            const msgId = 'msg_' + Date.now();
            setMessages(prev => [...prev, { id: msgId, type: 'bot', content: data.message, msgType: 'text' }]);
          }
        });

        socket.on('step_update', (data) => {
          setExecutions(prev => {
            const execId = Object.keys(prev).find(id => prev[id].status === 'running');
            if (!execId) return prev;

            const updated = { ...prev };
            const execution = { ...updated[execId] };
            const steps = execution.steps.map(s =>
              s.name === data.step ? { ...s, status: data.status, message: data.message } : s
            );
            execution.steps = steps;
            updated[execId] = execution;
            return updated;
          });
        });

        socket.on('execution_complete', (data) => {
          setExecutions(prev => {
            const execId = Object.keys(prev).find(id => prev[id].status === 'running');
            if (!execId) return prev;
            return { ...prev, [execId]: { ...prev[execId], status: data.success ? 'completed' : 'failed', result: data } };
          });
          socket.emit('get_stats');
        });

        // Demo interaction handler
        socket.on('demo_interaction', (data) => {
          showToast(data.message || '交互响应: ' + JSON.stringify(data));
        });

        // Story event handler
        socket.on('story_event', (data) => {
          setStoryEvents(prev => [...prev.slice(-4), data]);
        });

        return () => {
          socket.off('connect');
          socket.off('disconnect');
          socket.off('stats_update');
          socket.off('bot_response');
          socket.off('step_update');
          socket.off('execution_complete');
          socket.off('demo_interaction');
          socket.off('story_event');
        };
      }, []);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleSend = useCallback(() => {
        if (!inputValue.trim()) return;

        // Handle architecture view command locally
        if (inputValue.includes('展示系统架构') || inputValue.includes('系统架构') || inputValue.includes('架构视图')) {
          setMessages(prev => [...prev, { id: 'msg_' + Date.now(), type: 'user', content: inputValue, msgType: 'text' }]);
          setIsArchitectureOpen(true);
          setInputValue('');
          return;
        }

        setMessages(prev => [...prev, { id: 'msg_' + Date.now(), type: 'user', content: inputValue, msgType: 'text' }]);
        setIsTyping(true);
        socket.emit('user_message', { message: inputValue });
        setInputValue('');
      }, [inputValue]);

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      };

      const handleQuickCmd = (message) => {
        setMessages(prev => [...prev, { id: 'msg_' + Date.now(), type: 'user', content: message, msgType: 'text' }]);
        setIsTyping(true);
        socket.emit('user_message', { message });
      };

      const handleConfirm = (data) => {
        socket.emit('confirm_deploy', { service: data.service, version: data.version, environment: data.environment });
      };

      const handleNavClick = (section) => {
        showToast('导航: ' + section);
        socket.emit('demo_interaction', { interactionId: `click:sidebar:nav:${section}` });
      };

      const handleRoleChange = (roleId) => {
        setActiveRole(roleId);
        const role = ROLES.find(r => r.id === roleId);
        showToast('切换角色: ' + (role ? role.name_zh : roleId));
        socket.emit('demo_interaction', { interactionId: `click:sidebar:role:${roleId}` });
      };

      const handleToolClick = (toolName) => {
        showToast('工具: ' + toolName);
        socket.emit('demo_interaction', { interactionId: `click:sidebar:tool:${toolName}` });
      };

      const handleAlertClick = (alertTitle) => {
        showToast('告警: ' + alertTitle);
        socket.emit('demo_interaction', { interactionId: `click:alerts:${alertTitle}` });
      };

      const handleMetricClick = (metricName) => {
        showToast('指标: ' + metricName);
        socket.emit('demo_interaction', { interactionId: `click:metric:${metricName}` });
      };

      const handleStageClick = (stageName) => {
        showToast('流程阶段: ' + stageName);
        socket.emit('demo_interaction', { interactionId: `click:pipeline:stage:${stageName}` });
      };

      const handleAgentNodeClick = (agentName) => {
        showToast('智能体: ' + agentName);
        socket.emit('demo_interaction', { interactionId: `click:agent:${agentName}` });
      };

      const handleSidebarAgentClick = (agentName) => {
        showToast('智能体详情: ' + agentName);
        socket.emit('demo_interaction', { interactionId: `click:sidebar:agent:${agentName}` });
      };

      const handleSearchSubmit = (query) => {
        if (query.trim()) {
          showToast('搜索: ' + query);
          socket.emit('demo_interaction', { interactionId: 'click:search:submit' });
        }
      };

      const handleMicClick = () => {
        showToast('语音输入');
        socket.emit('demo_interaction', { interactionId: 'click:input:mic' });
      };

      const handleFooterStatusClick = (statusType) => {
        showToast('状态: ' + statusType);
        socket.emit('demo_interaction', { interactionId: `click:footer:${statusType}` });
      };

      const handleNotificationClick = () => {
        showToast('通知面板');
        socket.emit('demo_interaction', { interactionId: 'click:notification:bell' });
      };

      const handleSettingsClick = () => {
        showToast('设置');
        socket.emit('demo_interaction', { interactionId: 'click:topnav:settings' });
      };

      const handleUserMenuClick = () => {
        showToast('用户菜单');
        socket.emit('demo_interaction', { interactionId: 'click:topnav:user' });
      };

      const handleRoleSwitcherClick = () => {
        showToast('角色列表');
        socket.emit('demo_interaction', { interactionId: 'click:sidebar:role_switcher' });
      };

      const handleSystemSettingsClick = () => {
        showToast('系统设置');
        socket.emit('demo_interaction', { interactionId: 'click:sidebar:system_settings' });
      };

      const handleGenericClick = (interactionId) => {
        const event = INTERACTION_RESPONSES[interactionId] || { type: 'toast', title_zh: '演示交互', data: {} };
        if (event.type === 'toast') {
          showToast(event.title_zh + ' - 演示交互');
        } else if (event.type === 'drawer') {
          setDrawerPanel({ open: true, title: event.title_zh, data: event.data });
        } else if (event.type === 'modal') {
          setModalPanel({ open: true, title: event.title_zh, data: event.data });
        }
        if (socket && socket.connected) {
          socket.emit('demo_interaction', { interactionId });
        }
      };

      const handleCommandChip = (chipText) => {
        const interactionId = 'click:quick_cmd:' + chipText;
        handleGenericClick(interactionId);
        handleQuickCmd(chipText);
      };

      const handleStoryModeOpen = () => {
        setIsStoryModeOpen(true);
        setCurrentStory(null);
        setCurrentStep(0);
        setStoryEvents([]);
        setHighlightedElement(null);
      };

      const handleStoryModeClose = () => {
        setIsStoryModeOpen(false);
        setCurrentStory(null);
        setCurrentStep(0);
        setStoryEvents([]);
        setHighlightedElement(null);
      };

      const handleStartStory = (storyId) => {
        setCurrentStory(storyId);
        setCurrentStep(0);
        setStoryEvents([]);

        const story = STORY_SEQUENCES[storyId];
        if (story && story.steps[0]) {
          const firstStep = story.steps[0];
          // Switch role
          setActiveRole(firstStep.role);
          // Set highlight
          setHighlightedElement({ type: firstStep.highlight, element: firstStep.highlightElement });
          // Emit demo interaction
          socket.emit('demo_interaction', { interactionId: `story:step:${storyId}:${firstStep.step}`, storyId, step: firstStep.step });
          // Emit story event
          socket.emit('story_advance', { storyId, step: firstStep.step, role: firstStep.role });
        }
      };

      const handleStoryNext = () => {
        const story = STORY_SEQUENCES[currentStory];
        if (!story) return;

        if (currentStep < story.steps.length - 1) {
          const nextStep = currentStep + 1;
          setCurrentStep(nextStep);
          const stepData = story.steps[nextStep];

          // Switch role
          setActiveRole(stepData.role);
          // Set highlight
          setHighlightedElement({ type: stepData.highlight, element: stepData.highlightElement });
          // Emit demo interaction
          socket.emit('demo_interaction', { interactionId: `story:step:${currentStory}:${stepData.step}`, storyId: currentStory, step: stepData.step });
          // Emit story event
          socket.emit('story_advance', { storyId: currentStory, step: stepData.step, role: stepData.role });
        } else {
          // Story complete
          handleStoryModeClose();
        }
      };

      const handleStoryPrev = () => {
        if (currentStep > 0) {
          const prevStep = currentStep - 1;
          setCurrentStep(prevStep);
          const stepData = STORY_SEQUENCES[currentStory].steps[prevStep];

          // Switch role
          setActiveRole(stepData.role);
          // Set highlight
          setHighlightedElement({ type: stepData.highlight, element: stepData.highlightElement });
          // Emit demo interaction
          socket.emit('demo_interaction', { interactionId: `story:step:${currentStory}:${stepData.step}`, storyId: currentStory, step: stepData.step });
        }
      };

      const handleStoryExit = () => {
        handleStoryModeClose();
      };

      const handleArchitectureViewOpen = () => {
        setIsArchitectureOpen(true);
      };

      const handleArchitectureViewClose = () => {
        setIsArchitectureOpen(false);
      };

      return (
        <div className="app-container">
          <StoryModeOverlay
            isOpen={isStoryModeOpen}
            onClose={handleStoryModeClose}
            onStartStory={handleStartStory}
            currentStory={currentStory}
            currentStep={currentStep}
            onNext={handleStoryNext}
            onPrev={handleStoryPrev}
            onExit={handleStoryExit}
            storyEvents={storyEvents}
          />

          <ArchitectureView
            isOpen={isArchitectureOpen}
            onClose={handleArchitectureViewClose}
          />

          <button
            className="story-start-btn"
            onClick={handleStoryModeOpen}
            data-testid="story-mode-start"
            style={{ position: 'fixed', bottom: 80, right: 24, zIndex: 500 }}
          >
            <i data-lucide="book-open"></i>
            故事模式
          </button>

          <Sidebar
            activeRole={activeRole}
            onRoleChange={handleRoleChange}
            onNavClick={handleNavClick}
            onToolClick={handleToolClick}
            onAgentClick={handleSidebarAgentClick}
            onRoleSwitcherClick={handleRoleSwitcherClick}
            onSystemSettingsClick={handleSystemSettingsClick}
            onArchitectureViewOpen={handleArchitectureViewOpen}
          />

          <div className="main-content">
            <TopNav onNavClick={handleNavClick} connected={connected} activeRole={activeRole} onSearchSubmit={handleSearchSubmit} onMicClick={handleMicClick} onNotificationClick={handleNotificationClick} onSettingsClick={handleSettingsClick} onUserMenuClick={handleUserMenuClick} />

            <div className="dashboard-content">
              <MetricsStrip stats={stats} activeRole={activeRole} />

              <div className="two-column">
                <div className="card conversation-panel">
                  <div className="card-header" data-testid="chat-header">
                    <div className="card-title">
                      <span className="card-title-main" data-testid="dashboard-headline">{ROLE_CONTENT[activeRole]?.headline || 'AI 智能中枢'}</span>
                      <span className="card-title-sub" data-testid="dashboard-headline-sub">{ROLE_CONTENT[activeRole]?.headlineSub || '通过对话驱动全流程'}</span>
                    </div>
                    <div className="card-actions">
                      <button className="card-action-btn" onClick={() => showToast('新建对话')}>新建对话</button>
                      <button className="card-action-btn" onClick={() => showToast('历史记录')}>历史记录</button>
                    </div>
                  </div>
                  <div className="conversation-messages">
                    <div className="message message-bot">
                      <div className="message-bubble">{WELCOME_MESSAGE}</div>
                    </div>

                    {messages.map((msg) => (
                      <Message
                        key={msg.id}
                        {...msg}
                        executions={executions}
                        onConfirm={handleConfirm}
                        onQuickCmd={handleQuickCmd}
                      />
                    ))}

                    {isTyping && (
                      <div className="message message-bot">
                        <div className="message-bubble">
                          <div className="typing-indicator">
                            <span className="typing-dot"></span>
                            <span className="typing-dot"></span>
                            <span className="typing-dot"></span>
                          </div>
                        </div>
                      </div>
                    )}

                    <div ref={messagesEndRef} />
                  </div>

                  <div className="conversation-input" data-testid="chat-input-container">
                    <div className="input-wrapper">
                      <input
                        type="text"
                        placeholder="输入指令或问题..."
                        value={inputValue}
                        onChange={(e) => setInputValue(e.target.value)}
                        onKeyPress={handleKeyPress}
                        data-testid="chat-input"
                      />
                      <div className="input-btn" onClick={handleMicClick}>
                        <i data-lucide="mic"></i>
                      </div>
                    </div>
                    <button className="send-btn" onClick={handleSend} data-testid="chat-send-btn">
                      <i data-lucide="send"></i>
                    </button>
                  </div>
                </div>

                <div className="right-column">
                  <AlertsPanel onAlertClick={handleAlertClick} />
                  <CollaborationPanel onAgentNodeClick={handleAgentNodeClick} />
                </div>
              </div>

              <PipelineFull onStageClick={handleStageClick} />
              <CommandDeck onChipClick={handleCommandChip} activeRole={activeRole} />
            </div>

            <FooterStatus connected={connected} onStatusClick={handleFooterStatusClick} />
          </div>
        </div>
      );
    }

    function Sidebar({ activeRole, onRoleChange, onNavClick, onToolClick, onAgentClick, onRoleSwitcherClick, onSystemSettingsClick, onArchitectureViewOpen }) {
      const [activeNav, setActiveNav] = useState('overview');

      const handleNav = (item) => {
        setActiveNav(item);
        if (item === 'architecture') {
          onArchitectureViewOpen();
        } else {
          onNavClick(item);
        }
      };

      return (
        <aside className="sidebar" data-testid="sidebar">
          <div className="sidebar-header">
            <div className="logo">
              <div className="logo-icon">
                <i data-lucide="sparkles"></i>
              </div>
              <span className="logo-text">AgentCenter</span>
              <span className="version-badge">v2.0</span>
            </div>
          </div>

          <div className="sidebar-content">
            <div className="sidebar-section">
              <div className="sidebar-section-title">角色切换</div>
              <div className="role-switcher" data-testid="role-switcher" onClick={onRoleSwitcherClick} data-interaction-id="click:sidebar:role_switcher">
                <i data-lucide={ROLES.find(r => r.id === activeRole)?.icon || 'User'}></i>
                <span className="role-switcher-text">
                  {ROLES.find(r => r.id === activeRole)?.name_zh || '选择角色'}
                </span>
                <i data-lucide="chevron-down" style={{marginLeft: 'auto'}}></i>
              </div>
              <div style={{padding: '8px 20px 0'}}>
                {ROLES.map(role => (
                  <div
                    key={role.id}
                    className={`nav-item ${activeRole === role.id ? 'active' : ''}`}
                    onClick={() => onRoleChange(role.id)}
                    data-interaction-id={`click:sidebar:role:${role.id}`}

      };

      return (
        <div className="execution-card">
          <div className="execution-header">
            {execution.status === 'running' && <div className="execution-spinner"></div>}
            <span className="execution-title">{execution.message || '执行流程'}</span>

          <div className="execution-steps">
            {execution.steps.map((step, idx) => (
              <div key={idx} className={`execution-step step-${step.status}`}>
                <span className="step-icon">
                  <i data-lucide={getStepIcon(step.status)}></i>

    function StoryModeOverlay({ isOpen, onClose, onStartStory, currentStory, currentStep, onNext, onPrev, onExit, storyEvents }) {
      const [selectedStory, setSelectedStory] = useState(null);

      if (!isOpen) return null;

      const handleStorySelect = (storyId) => {
        setSelectedStory(storyId);
        onStartStory(storyId);
      };

      const handleStartFromSelection = () => {
        if (selectedStory) {
          onStartStory(selectedStory);
        }
      };

      // If a story is playing
      if (currentStory && STORY_SEQUENCES[currentStory]) {
        const story = STORY_SEQUENCES[currentStory];
        const stepData = story.steps[currentStep];
        const totalSteps = story.steps.length;
        const role = ROLES.find(r => r.id === stepData?.role);

        return (
          <div className="story-overlay">
            <div className="story-modal">
              <div className="story-modal-header">
                <div className="story-modal-title">
                  <i data-lucide="book-open"></i>
                  {story.title}
                </div>
                <button className="story-close-btn" onClick={onExit} data-testid="story-mode-exit-btn">
                  <i data-lucide="x"></i>
                </button>
              </div>
              <div className="story-modal-body">
                <div className="story-step-container">
                  <div className="story-step-header">
                    <div className="story-step-info">
                      <div className="story-step-badge">{stepData.step}</div>
                      <div>
                        <div className="story-step-title">{stepData.action}</div>
                        <div className="story-step-role">
                          <i data-lucide={role?.icon || 'user'} style={{width: 12, height: 12, marginRight: 4}}></i>
                          {role?.name_zh || stepData.role}

                      </div>
                    </div>
                    <div className="story-step-count">步骤 {currentStep + 1} / {totalSteps}</div>
                  </div>
                  <div className="story-step-content">
                    <div className="story-step-section">
                      <div className="story-step-label">操作结果</div>
                      <div className="story-step-highlight">{stepData.result}</div>
                    </div>
                    <div className="story-step-section">
                      <div className="story-step-label">价值说明</div>
                      <div className="story-step-explanation">
                        <div className="story-step-value">{stepData.value}</div>
                      </div>
                    </div>
                    {storyEvents.length > 0 && (
                      <div className="story-step-section">
                        <div className="story-step-label">模拟事件</div>
                        <div className="story-event-feed">
                          {storyEvents.map((evt, idx) => (
                            <div key={idx} className="story-event-item">
                              <span className={`story-event-dot ${evt.severity?.toLowerCase() || 'info'}`}></span>
                              <span className="story-event-text">{evt.message}</span>
                              <span className="story-event-time">{new Date(evt.timestamp).toLocaleTimeString()}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
              <div className="story-controls">
                <button
                  className="story-btn story-btn-prev"
                  onClick={onPrev}
                  disabled={currentStep === 0}
                  data-testid="story-mode-prev-btn"
                >
                  <i data-lucide="chevron-left"></i>
                  上一步
                </button>
                <button
                  className="story-btn story-btn-next"
                  onClick={onNext}
                  data-testid="story-mode-next-btn"
                >
                  {currentStep === totalSteps - 1 ? '完成' : '下一步'}
                  <i data-lucide={currentStep === totalSteps - 1 ? 'check' : 'chevron-right'}></i>
                </button>
                <button
