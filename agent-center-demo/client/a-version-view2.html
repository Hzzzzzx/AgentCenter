<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentCenter · AI 编排工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #0c1222;
      --bg-insight: #1a2744;
      --bg-card: rgba(30, 41, 59, 0.7);
      --bg-card-hover: rgba(30, 41, 59, 0.9);
      --border-color: #334155;
      --border-color-light: rgba(148, 163, 184, 0.1);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-cyan: #06b6d4;
      --accent-cyan-dim: rgba(6, 182, 212, 0.15);
      --accent-cyan-glow: rgba(6, 182, 212, 0.3);
      --accent-blue: #3b82f6;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --glow-cyan: rgba(6, 182, 212, 0.4);
    }

    body {
      font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root { height: 100%; }

    .app-container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
    }

    .sidebar-header {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border-color);
      gap: 12px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 16px; height: 16px; color: white; }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .logo-subtitle {
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.2;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .sidebar-section {
      padding: 0 12px;
      margin-bottom: 16px;
    }

    .sidebar-section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 8px;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      transition: all 0.15s ease;
      border-left: 2px solid transparent;
      margin-bottom: 2px;
    }

    .nav-item:hover {
      background: rgba(148, 163, 184, 0.05);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: rgba(6, 182, 212, 0.1);
      color: var(--accent-cyan);
      border-left-color: var(--accent-cyan);
    }

    .nav-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .nav-divider {
      height: 1px;
      background: var(--border-color);
      margin: 12px 12px;
    }

    /* Agent Cards */
    .agent-card {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .agent-card:hover {
      background: rgba(15, 23, 42, 0.8);
    }

    .agent-card.active {
      border-left-color: var(--accent-cyan);
      background: rgba(6, 182, 212, 0.08);
    }

    .agent-card.active .agent-status {
      animation: pulse-glow 2s infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 4px var(--accent-cyan); }
      50% { box-shadow: 0 0 12px var(--accent-cyan); }
    }

    .agent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .agent-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .agent-status {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .agent-status.idle {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
    }

    .agent-status.working {
      background: rgba(6, 182, 212, 0.15);
      color: var(--accent-cyan);
    }

    .agent-status.analysis {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
    }

    .agent-status.monitoring {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
    }

    .agent-status .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .agent-status.working .dot {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .agent-action {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-card.active .agent-action {
      color: var(--text-secondary);
    }

    /* Engine Status */
    .engine-status {
      padding: 12px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 8px;
      margin: 0 12px;
    }

    .engine-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .engine-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }

    .engine-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .engine-subtitle {
      font-size: 11px;
      color: var(--text-muted);
    }

    .engine-progress {
      margin-top: 8px;
    }

    .engine-progress-bar {
      height: 4px;
      background: var(--border-color);
      border-radius: 2px;
      overflow: hidden;
    }

    .engine-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .engine-progress-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 240px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Top Bar */
    .top-bar {
      height: 48px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ai-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      background: rgba(6, 182, 212, 0.1);
      border-radius: 16px;
      border: 1px solid rgba(6, 182, 212, 0.2);
    }

    .ai-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-cyan);
      animation: pulse 2s infinite;
    }

    .ai-status-text {
      font-size: 12px;
      color: var(--accent-cyan);
      font-weight: 500;
    }

    .top-bar-center {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .search-bar {
      width: 100%;
      max-width: 400px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .search-bar:focus-within {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 2px var(--accent-cyan-dim);
    }

    .search-bar svg {
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 13px;
      color: var(--text-primary);
    }

    .search-bar input::placeholder {
      color: var(--text-muted);
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .top-bar-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s ease;
      position: relative;
    }

    .top-bar-icon:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .top-bar-icon svg {
      width: 18px;
      height: 18px;
    }

    .notification-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 14px;
      height: 14px;
      background: var(--error);
      border-radius: 50%;
      font-size: 9px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: white;
      cursor: pointer;
    }

    /* Content Area - Split Layout */
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Chat Panel (Left 60%) */
    .chat-panel {
      flex: 0 0 60%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      height: calc(100vh - 48px);
    }

    .chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-header-actions {
      display: flex;
      gap: 8px;
    }

    .chat-header-btn {
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .chat-header-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Message Types */
    .message {
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-items: flex-end;
    }

    .message.ai {
      align-items: flex-start;
    }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.user .message-bubble {
      background: #1e3a5f;
      color: var(--text-primary);
      border-bottom-right-radius: 4px;
    }

    .message.ai .message-bubble {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    /* Orchestration Plan Card */
    .plan-card {
      background: var(--bg-secondary);
      border: 1px solid var(--accent-cyan);
      border-radius: 12px;
      padding: 16px;
      max-width: 90%;
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.1);
    }

    .plan-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-cyan);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .plan-steps {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .plan-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .plan-step-number {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .plan-step.completed .plan-step-number {
      background: var(--success);
      color: white;
    }

    .plan-step.running .plan-step-number {
      background: var(--accent-cyan);
      color: white;
      animation: pulse 1.5s infinite;
    }

    .plan-step.waiting .plan-step-number {
      background: var(--border-color);
      color: var(--text-muted);
    }

    .plan-step-content {
      flex: 1;
    }

    .plan-step-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .plan-step-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .plan-step.waiting .plan-step-name {
      color: var(--text-muted);
    }

    .plan-step-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .plan-step-badge.success {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
    }

    .plan-step-badge.running {
      background: rgba(6, 182, 212, 0.15);
      color: var(--accent-cyan);
    }

    .plan-step-badge.waiting {
      background: rgba(148, 163, 184, 0.1);
      color: var(--text-muted);
    }

    .plan-step-agent {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 2px;
    }

    .plan-step-tool {
      font-size: 11px;
      color: var(--text-muted);
    }

    .plan-step.waiting .plan-step-agent,
    .plan-step.waiting .plan-step-tool {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .plan-footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .plan-time {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .plan-actions {
      display: flex;
      gap: 8px;
    }

    .plan-btn {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .plan-btn.primary {
      background: var(--accent-cyan);
      color: white;
      border: none;
    }

    .plan-btn.primary:hover {
      background: #0891b2;
    }

    .plan-btn.secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .plan-btn.secondary:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    /* Execution Progress Message */
    .execution-msg {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-primary);
      max-width: 90%;
    }

    .execution-msg.running {
      border-left: 2px solid var(--accent-cyan);
    }

    .execution-msg.completed {
      border-left: 2px solid var(--success);
    }

    .execution-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .execution-icon {
      font-size: 14px;
    }

    /* Approval Card */
    .approval-card {
      background: var(--bg-secondary);
      border: 2px solid var(--warning);
      border-radius: 12px;
      padding: 16px;
      max-width: 90%;
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.15);
    }

    .approval-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--warning);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .approval-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .approval-row {
      display: flex;
      gap: 12px;
    }

    .approval-label {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 60px;
    }

    .approval-value {
      font-size: 12px;
      color: var(--text-primary);
    }

    .approval-change {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
      padding: 8px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 6px;
    }

    .approval-actions {
      display: flex;
      gap: 8px;
    }

    .approval-btn {
      flex: 1;
      padding: 8px 16px;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .approval-btn.confirm {
      background: var(--warning);
      color: white;
      border: none;
    }

    .approval-btn.confirm:hover {
      background: #d97706;
    }

    .approval-btn.cancel {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .approval-btn.cancel:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    /* Result Card */
    .result-card {
      background: var(--bg-secondary);
      border: 1px solid var(--success);
      border-radius: 12px;
      padding: 16px;
      max-width: 90%;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--success);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .result-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .result-time {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .result-stats {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .result-stat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .result-stat-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-stat.success {
      color: var(--success);
    }

    .result-action {
      display: flex;
    }

    .result-btn {
      padding: 6px 12px;
      font-size: 12px;
      background: transparent;
      color: var(--accent-cyan);
      border: 1px solid var(--accent-cyan);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .result-btn:hover {
      background: var(--accent-cyan-dim);
    }

    /* Chat Input */
    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-primary);
    }

    .chat-input-wrapper {
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 12px;
      transition: all 0.2s ease;

    .chat-input-wrapper:focus-within {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 2px var(--accent-cyan-dim);
    }

    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text-primary);
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .chat-send-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-cyan);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      transition: all 0.15s ease;
    }

    .chat-send-btn:hover {
      background: #0891b2;
    }

    .chat-send-btn svg {
      width: 16px;
      height: 16px;
    }

    .chat-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      padding: 0 4px;
    }

    /* Preview Panel (Right 40%) */
    .preview-panel {
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 48px);
      background: var(--bg-primary);
    }

    .preview-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-section:first-child {
      border-bottom: 1px solid var(--border-color);
    }

    .preview-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--bg-secondary);
    }

    .preview-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Orchestration Plan Preview */
    .orchestration-plan {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .orchestration-step {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      border-left: 3px solid transparent;
      transition: all 0.2s ease;
    }

    .orchestration-step.active {
      border-left-color: var(--accent-cyan);
      background: rgba(6, 182, 212, 0.05);
    }

    .orchestration-step.completed {
      border-left-color: var(--success);
    }

    .orchestration-step.waiting {
      opacity: 0.6;
    }

    .orchestration-step-number {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .orchestration-step.completed .orchestration-step-number {
      background: var(--success);
      color: white;
    }

    .orchestration-step.active .orchestration-step-number {
      background: var(--accent-cyan);
      color: white;
    }

    .orchestration-step.waiting .orchestration-step-number {
      background: var(--border-color);
      color: var(--text-muted);
    }

    .orchestration-step-info {
      flex: 1;
    }

    .orchestration-step-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .orchestration-step-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .orchestration-step-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .orchestration-step-badge.completed {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
    }

    .orchestration-step-badge.active {
      background: rgba(6, 182, 212, 0.15);
      color: var(--accent-cyan);
    }

    .orchestration-step-badge.waiting {
      background: rgba(148, 163, 184, 0.1);
      color: var(--text-muted);
    }

    .orchestration-step-agent {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .orchestration-step-tool {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .orchestration-progress {
      margin-top: 16px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
    }

    .orchestration-progress-bar {
      height: 6px;
      background: var(--border-color);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .orchestration-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-cyan), var(--success));
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .orchestration-progress-text {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    /* Live Tool Calls */
    .tool-calls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tool-call {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
    }

    .tool-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tool-status.active {
      background: var(--accent-cyan);
      animation: tool-pulse 1.5s infinite;
    }

    .tool-status.completed {
      background: var(--success);
    }

    .tool-status.waiting {
      background: var(--border-color);
    }

    @keyframes tool-pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--glow-cyan); }
      50% { box-shadow: 0 0 8px 2px var(--glow-cyan); }
    }

    .tool-info {
      flex: 1;
    }

    .tool-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .tool-status-text {
      font-size: 11px;
      color: var(--text-muted);
    }

    .tool-status-text.active {
      color: var(--accent-cyan);
    }

    .tool-status-text.completed {
      color: var(--success);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Icons
    const Icon = ({ name, size = 16, className = '' }) => {
      const icons = {
        'layout-dashboard': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,

        'clipboard-list': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>,
        'wrench': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>,
      };
      return icons[name] || icons['bot'];
    };

    // Navigation items
    const navItems = [
      { id: 'overview', label: '智能总览', icon: 'layout-dashboard', active: false, url: '/a-version.html' },
      { id: 'conversation', label: '对话编排', icon: 'message-square', active: true, url: '/a-version-view2.html' },
      { id: 'monitor', label: '编排监控', icon: 'activity', active: false, url: '/a-version-view3.html' },
      { id: 'topology', label: '服务拓扑', icon: 'network', active: false, url: '/a-version-view4.html' },
      { id: 'architecture', label: '架构说明', icon: 'layers', active: false, url: '/a-version-view5.html' }
    ];

    // Agents data
    const agents = [
      { id: 'demand', name: '需求分析', status: 'working', action: '更新 REQ-102', tool: '需求管理平台' },
      { id: 'code', name: '代码审查', status: 'idle', action: '等待下一个任务', tool: '代码质量平台' },
      { id: 'quality', name: '质量验证', status: 'idle', action: '等待下一个任务', tool: '测试平台' },
      { id: 'deploy', name: '部署编排', status: 'idle', action: '等待下一个任务', tool: '部署平台' },
      { id: 'monitor', name: '监控预警', status: 'idle', action: '等待下一个任务', tool: '可观测性平台' }
    ];

    // Initial messages for the conversation
    const initialMessages = [
      {
        id: 1,
        type: 'user',
        content: '把 identity-domain 部署到生产环境'
      },
      {
        id: 2,
        type: 'ai',
        content: '好的，我来编排 identity-domain v2.3.2 的生产部署。基于当前状态分析，我计划如下：'
      },
      {
        id: 3,
        type: 'plan',
        steps: [
          { name: '确认需求状态', agent: '需求分析Agent', tool: '需求管理平台', status: 'completed' },
          { name: '代码审查', agent: '代码审查Agent', tool: '代码质量平台', status: 'running' },
          { name: '构建+测试', agent: '质量验证Agent', tool: '构建引擎 → 测试平台', status: 'waiting' },
          { name: '部署发布', agent: '部署编排Agent', tool: '部署平台', status: 'waiting' },
          { name: '健康检查', agent: '监控预警Agent', tool: '可观测性平台', status: 'waiting' }
        ],
        timeEstimate: '8 分钟'
      }
    ];

    // Execution steps that will be shown progressively
    const executionSteps = [
      { id: 4, type: 'execution', status: 'completed', icon: '✅', text: '需求状态已确认，REQ-102 开发完成' },
      { id: 5, type: 'execution', status: 'running', icon: '🏃', text: '代码审查Agent 正在扫描 PR #287...', agent: 'code' },
      { id: 6, type: 'execution', status: 'completed', icon: '✅', text: '代码审查完成，发现 0 个问题' },
      { id: 7, type: 'approval' },
      { id: 8, type: 'execution', status: 'running', icon: '🏃', text: '构建引擎: 构建 #429 进行中...', agent: 'build' },
      { id: 9, type: 'execution', status: 'completed', icon: '✅', text: '构建 #429 完成' },
      { id: 10, type: 'execution', status: 'running', icon: '🏃', text: '测试平台: 回归测试套件 #43...', agent: 'test' },
      { id: 11, type: 'execution', status: 'completed', icon: '✅', text: '回归测试 12/12 通过' },
      { id: 12, type: 'execution', status: 'running', icon: '🏃', text: '部署平台: 部署 identity-domain v2.3.2...', agent: 'deploy' },
      { id: 13, type: 'execution', status: 'completed', icon: '✅', text: '部署成功' },
      { id: 14, type: 'execution', status: 'running', icon: '🏃', text: '可观测性平台: 健康检查...', agent: 'monitor' },
      { id: 15, type: 'execution', status: 'completed', icon: '✅', text: '健康检查通过，P99 延迟 180ms' },
      { id: 16, type: 'result' }
    ];

    // Tool states
    const initialTools = [
      { id: 'demand', name: '需求管理平台', status: 'completed', action: '已读取 REQ-102' },
      { id: 'code', name: '代码质量平台', status: 'active', action: '正在扫描 PR #287' },
      { id: 'build', name: '构建引擎', status: 'waiting', action: '等待' },
      { id: 'deploy', name: '部署平台', status: 'waiting', action: '等待' },
      { id: 'monitor', name: '可观测性平台', status: 'waiting', action: '等待' }
    ];

    function App() {
      const [messages, setMessages] = useState(initialMessages);
      const [planStep, setPlanStep] = useState(2); // Current step being executed (0-indexed)
      const [tools, setTools] = useState(initialTools);
      const [currentExecutionStep, setCurrentExecutionStep] = useState(0);
      const [inputValue, setInputValue] = useState('');
      const chatMessagesRef = useRef(null);
      const autoPlayRef = useRef(null);

      // Auto-scroll to bottom
      useEffect(() => {
        if (chatMessagesRef.current) {
          chatMessagesRef.current.scrollTop = chatMessagesRef.current.scrollHeight;
        }
      }, [messages]);

      // Auto-play execution steps
      useEffect(() => {
        if (currentExecutionStep >= executionSteps.length) {
          return;
        }

        autoPlayRef.current = setTimeout(() => {
          const step = executionSteps[currentExecutionStep];
          setMessages(prev => [...prev, step]);

          // Update plan step
          if (step.type === 'execution' && step.status === 'completed') {
            setPlanStep(prev => Math.min(prev + 1, 5));
          }

          // Update tool states
          if (step.agent) {
            setTools(prev => prev.map(t => {
              if (t.id === step.agent && step.status === 'completed') {
                return { ...t, status: 'completed', action: t.action.replace('正在', '已完成') };
              }
              if (t.id === step.agent && step.status === 'running') {
                return { ...t, status: 'active' };
              }
              return t;
            }));
          }

          // Update next tool
          if (step.status === 'completed') {
            const nextStep = executionSteps[currentExecutionStep + 1];
            if (nextStep && nextStep.agent) {
              setTools(prev => prev.map(t => {
                if (t.id === nextStep.agent) {
                  return { ...t, status: 'active', action: '准备中...' };
                }
                return t;
              }));
            }
          }

          setCurrentExecutionStep(prev => prev + 1);
        }, 2000);

        return () => {
          if (autoPlayRef.current) {
            clearTimeout(autoPlayRef.current);
          }
        };
      }, [currentExecutionStep]);

      const handleSendMessage = () => {
        if (!inputValue.trim()) return;

        const userMessage = {
          id: Date.now(),
          type: 'user',
          content: inputValue
        };

        const aiResponse = {
          id: Date.now() + 1,
          type: 'ai',
          content: '收到，我来分析一下...'
        };

        setMessages(prev => [...prev, userMessage, aiResponse]);
        setInputValue('');
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSendMessage();
        }
      };

      const getStatusLabel = (status) => {
        switch(status) {
          case 'idle': return '空闲';
          case 'working': return '执行中';
          case 'analysis': return '分析中';
          case 'monitoring': return '监控中';
          default: return status;
        }
      };

      const renderMessage = (msg) => {
        switch(msg.type) {
          case 'user':
            return (
              <div className="message user" key={msg.id}>
                <div className="message-bubble">{msg.content}</div>
              </div>
            );

          case 'ai':
            return (
              <div className="message ai" key={msg.id}>
                <div className="message-bubble">{msg.content}</div>
              </div>
            );

          case 'plan':
            return (
              <div className="message ai" key={msg.id}>
                <div className="plan-card">
                  <div className="plan-card-header">
                    <span>📋</span>
                    <span>编排计划</span>
                  </div>
                  <div className="plan-steps">
                    {msg.steps.map((step, index) => (
                      <div className={`plan-step ${step.status}`} key={index}>
                        <div className="plan-step-number">
                          {step.status === 'completed' ? '✓' : index + 1}
                        </div>
                        <div className="plan-step-content">
                          <div className="plan-step-header">
                            <span className="plan-step-name">{step.name}</span>
                            <span className={`plan-step-badge ${step.status}`}>
                              {step.status === 'completed' && '完成'}
                              {step.status === 'running' && '执行中'}
                              {step.status === 'waiting' && '等待'}
                            </span>
                          </div>
                          <div className="plan-step-agent">Agent: {step.agent}</div>
                          <div className="plan-step-tool">工具: {step.tool}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="plan-footer">
                    <div className="plan-time">
                      <span>⏱</span>
                      <span>预计总耗时: ~{msg.timeEstimate}</span>
                    </div>
                    <div className="plan-actions">
                      <button className="plan-btn secondary">📝 调整计划</button>
                      <button className="plan-btn primary">✅ 确认执行</button>
                    </div>
                  </div>
                </div>
              </div>
            );

          case 'execution':
            return (
              <div className="message ai" key={msg.id}>
                <div className={`execution-msg ${msg.status}`}>
                  {msg.status === 'running' && <div className="execution-spinner"></div>}
                  {msg.status === 'completed' && <span className="execution-icon">{msg.icon}</span>}
                  <span>{msg.text}</span>
                </div>
              </div>
            );

          case 'approval':
            return (
              <div className="message ai" key={msg.id}>
                <div className="approval-card">
                  <div className="approval-header">
                    <span>⚠️</span>
                    <span>审批确认</span>
                  </div>
                  <div className="approval-content">
                    <div className="approval-row">
                      <span className="approval-label">部署:</span>
                      <span className="approval-value">identity-domain</span>
                    </div>
                    <div className="approval-row">
                      <span className="approval-label">版本:</span>
                      <span className="approval-value">v2.3.2</span>
                    </div>
                    <div className="approval-row">
                      <span className="approval-label">环境:</span>
                      <span className="approval-value">生产 (production)</span>
                    </div>
                    <div className="approval-change">
                      上次部署: 2 小时前 (v2.3.1)<br/>
                      变更内容: 连接池配置优化 + 超时重试机制
                    </div>
                  </div>
                  <div className="approval-actions">
                    <button className="approval-btn cancel">❌ 取消</button>
                    <button className="approval-btn confirm">✅ 确认部署到生产</button>
                  </div>
                </div>
              </div>
            );

          case 'result':
            return (
              <div className="message ai" key={msg.id}>
                <div className="result-card">
                  <div className="result-header">
                    <span>✅</span>
                    <span>编排完成</span>
                  </div>
                  <div className="result-title">🚀 identity-domain v2.3.2 已部署到生产环境</div>
                  <div className="result-time">总耗时: 7 分 32 秒</div>
                  <div className="result-stats">
                    <div className="result-stat success">
                      <span className="result-stat-icon">✓</span>
                      <span>代码审查: 0 个问题</span>
                    </div>
                    <div className="result-stat success">
                      <span className="result-stat-icon">✓</span>
                      <span>构建测试: 12/12 通过</span>
                    </div>
                    <div className="result-stat success">
                      <span className="result-stat-icon">✓</span>
                      <span>部署状态: 成功</span>
                    </div>
                    <div className="result-stat success">
                      <span className="result-stat-icon">✓</span>
                      <span>健康检查: P99 延迟 180ms</span>
                    </div>
                  </div>
                  <div className="result-action">
                    <button className="result-btn">📊 查看详细报告</button>
                  </div>
                </div>
              </div>
            );

          default:
            return null;
        }
      };

      return (
        <div className="app-container">
          {/* Sidebar */}
          <aside className="sidebar">
            <div className="sidebar-header">
              <div className="logo-icon">
                <Icon name="bot" size={16} />
              </div>
              <div className="logo-text">
                <span className="logo-title">AgentCenter</span>
                <span className="logo-subtitle">AI 编排工作台</span>
              </div>
            </div>

            <div className="sidebar-content">
              <div className="sidebar-section">
                {navItems.map(item => (
                  <div
                    key={item.id}
                    className={`nav-item ${item.active ? 'active' : ''}`}
                    onClick={() => { if (item.url) window.location.href = item.url; }}
                  >
                    <Icon name={item.icon} size={16} />
                    <span>{item.label}</span>
                  </div>
                ))}
              </div>

              <div className="nav-divider"></div>

              <div className="sidebar-section">
                <div className="sidebar-section-title">智能体</div>
                {agents.map(agent => (
                  <div
                    key={agent.id}
                    className={`agent-card ${agent.status === 'working' || agent.status === 'monitoring' ? 'active' : ''}`}
                  >
                    <div className="agent-header">
                      <span className="agent-name">
                        <span>🤖</span>
                        {agent.name} Agent
                      </span>
                      <span className={`agent-status ${agent.status}`}>
                        <span className="dot"></span>
                        {getStatusLabel(agent.status)}
                      </span>
                    </div>
                    <div className="agent-action">
                      {agent.action} · {agent.tool}
                    </div>
                  </div>
                ))}
              </div>

              <div className="nav-divider"></div>

              <div className="sidebar-section">
                <div className="sidebar-section-title">编排引擎</div>
                <div className="engine-status">
                  <div className="engine-header">
                    <div className="engine-dot"></div>
                    <span className="engine-title">在线</span>
                  </div>
                  <div className="engine-subtitle">当前 1 个编排任务</div>
                  <div className="engine-progress">
                    <div className="engine-progress-bar">
                      <div className="engine-progress-fill" style={{width: '40%'}}></div>
                    </div>
                    <div className="engine-progress-label">
                      <span>部署 identity-domain</span>
                      <span>40%</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </aside>

          {/* Main Content */}
          <main className="main-content">
            {/* Top Bar */}
            <nav className="top-bar">
              <div className="top-bar-left">
                <div className="ai-status">
                  <div className="ai-status-dot"></div>
                  <span className="ai-status-text">AI 引擎在线</span>
                </div>
              </div>

              <div className="top-bar-center">
                <div className="search-bar">
                  <Icon name="search" size={14} />
                  <input type="text" placeholder="搜索服务、需求、工单..." />
                </div>
              </div>

              <div className="top-bar-right">
                <div className="top-bar-icon">
                  <Icon name="bell" size={18} />
                  <span className="notification-badge">3</span>
                </div>
                <div className="user-avatar">李</div>
              </div>
            </nav>

            {/* Content Area - Split Layout */}
            <div className="content-area">
              {/* Chat Panel (Left 60%) */}
              <div className="chat-panel">
                <div className="chat-header">
                  <div className="chat-header-title">
                    <span>💬</span>
                    <span>对话编排</span>
                  </div>
                  <div className="chat-header-actions">
                    <button className="chat-header-btn">清空</button>
                    <button className="chat-header-btn">历史</button>
                  </div>
                </div>

                <div className="chat-messages" ref={chatMessagesRef}>
                  {messages.map(msg => renderMessage(msg))}
                </div>

                <div className="chat-input-area">
                  <div className="chat-input-wrapper">
                    <input
                      type="text"
                      className="chat-input"
                      placeholder="向 AI 提问或发起编排..."
                      value={inputValue}
                      onChange={(e) => setInputValue(e.target.value)}
                      onKeyPress={handleKeyPress}
                    />
                    <button className="chat-send-btn" onClick={handleSendMessage}>
                      <Icon name="send" size={16} />
                    </button>
                  </div>
                  <div className="chat-hint">
                    试试: 处理 INC-0892 / 发布 REQ-102 / 检查所有服务健康
                  </div>
                </div>
              </div>

              {/* Preview Panel (Right 40%) */}
              <div className="preview-panel">
                {/* Orchestration Plan Preview */}
                <div className="preview-section">
                  <div className="preview-header">
                    <Icon name="clipboard-list" size={14} />
                    <span>编排计划</span>
                  </div>
                  <div className="preview-content">
                    <div className="orchestration-plan">
                      {[
                        { name: '确认需求', agent: '需求分析Agent', status: 'completed' },
                        { name: '代码审查', agent: '代码审查Agent', status: planStep >= 2 ? (planStep > 2 ? 'completed' : 'active') : 'waiting' },
                        { name: '构建测试', agent: '质量验证Agent', status: planStep >= 3 ? (planStep > 3 ? 'completed' : 'active') : 'waiting' },
                        { name: '部署发布', agent: '部署编排Agent', status: planStep >= 4 ? (planStep > 4 ? 'completed' : 'active') : 'waiting' },
                        { name: '健康检查', agent: '监控预警Agent', status: planStep >= 5 ? (planStep > 5 ? 'completed' : 'active') : 'waiting' }
                      ].map((step, index) => (
                        <div className={`orchestration-step ${step.status}`} key={index}>
                          <div className="orchestration-step-number">
                            {step.status === 'completed' ? '✓' : index + 1}
                          </div>
                          <div className="orchestration-step-info">
                            <div className="orchestration-step-header">
                              <span className="orchestration-step-name">{step.name}</span>
                              <span className={`orchestration-step-badge ${step.status}`}>
                                {step.status === 'completed' && '✅ 完成'}
                                {step.status === 'active' && '🏃 执行中'}
                                {step.status === 'waiting' && '⏳ 等待'}
                              </span>
                            </div>
                            <div className="orchestration-step-agent">{step.agent}</div>
                          </div>
                        </div>
                      ))}
                    </div>

                    <div className="orchestration-progress">
                      <div className="orchestration-progress-bar">
                        <div className="orchestration-progress-fill" style={{width: `${(planStep / 5) * 100}%`}}></div>
                      </div>
                      <div className="orchestration-progress-text">
                        进度: {planStep}/5 步骤完成
                      </div>
                    </div>
                  </div>
                </div>

                {/* Live Tool Calls */}
                <div className="preview-section">
                  <div className="preview-header">
                    <Icon name="wrench" size={14} />
                    <span>实时工具调用</span>
                  </div>
                  <div className="preview-content">
                    <div className="tool-calls">
                      {tools.map(tool => (
                        <div className="tool-call" key={tool.id}>
                          <div className={`tool-status ${tool.status}`}></div>
                          <div className="tool-info">
                            <div className="tool-name">{tool.name}</div>
                            <div className={`tool-status-text ${tool.status}`}>
                              {tool.status === 'active' && tool.action}
                              {tool.status === 'completed' && tool.action}
                              {tool.status === 'waiting' && tool.action}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
