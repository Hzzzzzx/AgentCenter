<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentCenter · 架构说明</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #0c1222;
      --bg-insight: #1a2744;
      --bg-card: rgba(30, 41, 59, 0.7);
      --bg-card-hover: rgba(30, 41, 59, 0.9);
      --border-color: #334155;
      --border-color-light: rgba(148, 163, 184, 0.1);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-cyan: #06b6d4;
      --accent-cyan-dim: rgba(6, 182, 212, 0.15);
      --accent-cyan-glow: rgba(6, 182, 212, 0.3);
      --accent-blue: #3b82f6;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --glow-cyan: rgba(6, 182, 212, 0.4);
    }

    body {
      font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root { height: 100%; }

    .app-container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
    }

    .sidebar-header {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border-color);
      gap: 12px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 16px; height: 16px; color: white; }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .logo-subtitle {
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.2;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .sidebar-section {
      padding: 0 12px;
      margin-bottom: 16px;
    }

    .sidebar-section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 8px;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      transition: all 0.15s ease;
      border-left: 2px solid transparent;
      margin-bottom: 2px;
    }

    .nav-item:hover {
      background: rgba(148, 163, 184, 0.05);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: rgba(6, 182, 212, 0.1);
      color: var(--accent-cyan);
      border-left-color: var(--accent-cyan);
    }

    .nav-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .nav-divider {
      height: 1px;
      background: var(--border-color);
      margin: 12px 12px;
    }

    /* Agent Cards */
    .agent-card {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .agent-card:hover {
      background: rgba(15, 23, 42, 0.8);
    }

    .agent-card.active {
      border-left-color: var(--accent-cyan);
      background: rgba(6, 182, 212, 0.08);
    }

    .agent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .agent-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .agent-status {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .agent-status.idle {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
    }

    .agent-status.working {
      background: rgba(6, 182, 212, 0.15);
      color: var(--accent-cyan);
    }

    .agent-status .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .agent-card.active .agent-status.working .dot {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .agent-action {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Engine Status */
    .engine-status {
      padding: 12px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 8px;
      margin: 0 12px;
    }

    .engine-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .engine-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }

    .engine-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .engine-subtitle {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 240px;
      width: calc(100vw - 240px);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Top Bar */
    .top-bar {
      height: 48px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ai-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      background: rgba(6, 182, 212, 0.1);
      border-radius: 16px;
      border: 1px solid rgba(6, 182, 212, 0.2);
    }

    .ai-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-cyan);
      animation: pulse 2s infinite;
    }

    .ai-status-text {
      font-size: 12px;
      color: var(--accent-cyan);
      font-weight: 500;
    }

    .top-bar-center {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .search-bar {
      width: 100%;
      max-width: 400px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .search-bar:focus-within {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 2px var(--accent-cyan-dim);
    }

    .search-bar svg {
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 13px;
      color: var(--text-primary);
    }

    .search-bar input::placeholder {
      color: var(--text-muted);
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .top-bar-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s ease;
      position: relative;
    }

    .top-bar-icon:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: white;
      cursor: pointer;
    }

    /* View Content */
    .view-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 20px;
      gap: 16px;
      overflow-y: auto;
    }

    /* Architecture Explanation Styles */
    .arch-title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-radius: 10px;
      border: 1px solid var(--border-color);
    }

    .arch-title-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .arch-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .arch-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .arch-title-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .arch-badge {
      padding: 6px 12px;
      background: rgba(6, 182, 212, 0.1);
      border: 1px solid rgba(6, 182, 212, 0.2);
      border-radius: 16px;
      font-size: 12px;
      color: var(--accent-cyan);
    }

    /* Layer Diagram */
    .layer-diagram {
      background: var(--bg-secondary);
      border-radius: 10px;
      border: 1px solid var(--border-color);
      padding: 20px;
      position: relative;
    }

    .layer-diagram-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .layer-diagram-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .layer-legend {
      display: flex;
      gap: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .legend-dot.core { background: var(--accent-cyan); }
    .legend-dot.side { background: var(--warning); }
    .legend-dot.security { background: var(--error); }

    .layers-container {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }

    .layer-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .layer-card {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .layer-card:hover {
      border-color: var(--accent-cyan);
      transform: translateY(-1px);
    }

    .layer-card.core {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
    }

    .layer-card.core::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 8px;
      padding: 1px;
      background: linear-gradient(135deg, var(--accent-cyan), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .layer-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .layer-number {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
    }

    .layer-number.layer-1 { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    .layer-number.layer-2 { background: rgba(168, 85, 247, 0.2); color: #c084fc; }
    .layer-number.layer-3 { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
    .layer-number.layer-4 { background: rgba(249, 115, 22, 0.2); color: #fb923c; }
    .layer-number.layer-5 { background: rgba(239, 68, 68, 0.2); color: #f87171; }

    .layer-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .layer-name-en {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: auto;
    }

    .layer-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .layer-expand-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: transform 0.2s ease;
    }

    .layer-card.expanded .layer-expand-icon {
      transform: rotate(180deg);
    }

    .layer-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .layer-card.expanded .layer-details {
      max-height: 200px;
    }

    .layer-details-inner {
      padding-top: 12px;
      margin-top: 12px;
      border-top: 1px solid var(--border-color);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .detail-group h4 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .detail-group ul {
      list-style: none;
    }

    .detail-group li {
      font-size: 12px;
      color: var(--text-secondary);
      padding: 3px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-group li::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent-cyan);
    }

    /* Side Layers */
    .layers-with-sides {
      display: grid;
      grid-template-columns: 1fr 60px 1fr;
      gap: 16px;
    }

    .side-layers {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .side-layer-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .side-layer-card:hover {
      border-color: var(--warning);
    }

    .side-layer-card.memory {
      border-color: rgba(249, 115, 22, 0.3);
    }

    .side-layer-card.security {
      border-color: rgba(239, 68, 68, 0.3);
    }

    .side-layer-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .side-layer-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .side-connector {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .connector-line {
      width: 2px;
      height: 30px;
      background: linear-gradient(to bottom, var(--accent-cyan), var(--warning));
      border-radius: 1px;
    }

    .connector-dots {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .connector-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-cyan);
      animation: flowDot 1.5s infinite;
    }

    .connector-dot:nth-child(2) { animation-delay: 0.3s; }
    .connector-dot:nth-child(3) { animation-delay: 0.6s; }

    @keyframes flowDot {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(3px); }
    }

    /* Data Flow Arrows */
    .flow-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0;
      position: relative;
    }

    .flow-arrow-line {
      height: 2px;
      flex: 1;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
      position: relative;
      overflow: hidden;
    }

    .flow-arrow-line::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, white, transparent);
      animation: flow 2s infinite;
    }

    @keyframes flow {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .flow-arrow.bidirectional .flow-arrow-line {
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-cyan));
    }

    .flow-arrow.bidirectional::before,
    .flow-arrow.bidirectional::after {
      content: '';
      position: absolute;
      width: 0;
      height: 0;
      border-style: solid;
    }

    .flow-arrow.bidirectional::before {
      left: 0;
      border-width: 4px 6px 4px 0;
      border-color: transparent var(--accent-cyan) transparent transparent;
    }

    .flow-arrow.bidirectional::after {
      right: 0;
      border-width: 4px 0 4px 6px;
      border-color: transparent transparent transparent var(--accent-cyan);
    }

    .flow-label {
      position: absolute;
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Core Pulse Animation */
    @keyframes corePulse {
      0%, 100% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.15); }
      50% { box-shadow: 0 0 30px rgba(6, 182, 212, 0.3); }
    }

    .layer-card.core {
      animation: corePulse 3s infinite;
    }

    /* Agent Toolchain Table */
    .toolchain-section {
      background: var(--bg-secondary);
      border-radius: 10px;
      border: 1px solid var(--border-color);
      padding: 20px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .toolchain-table {
      width: 100%;
      border-collapse: collapse;
    }

    .toolchain-table th,
    .toolchain-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .toolchain-table th {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--bg-primary);
    }

    .toolchain-table td {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .toolchain-table tr:last-child td {
      border-bottom: none;
    }

    .toolchain-table tr:hover td {
      background: rgba(6, 182, 212, 0.05);
    }

    .agent-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .agent-avatar-small {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: white;
    }

    .agent-avatar-small.analyst { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
    .agent-avatar-small.engineer { background: linear-gradient(135deg, #22c55e, #10b981); }
    .agent-avatar-small.qa { background: linear-gradient(135deg, #f59e0b, #f97316); }
    .agent-avatar-small.ops { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .agent-avatar-small.architect { background: linear-gradient(135deg, #8b5cf6, #a855f7); }
    .agent-avatar-small.orchestrator { background: linear-gradient(135deg, #06b6d4, #0ea5e9); }

    .tool-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tool-tag {
      padding: 2px 8px;
      background: var(--bg-primary);
      border-radius: 4px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* Runtime Comparison */
    .runtime-comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .runtime-card {
      background: var(--bg-secondary);
      border-radius: 10px;
      border: 1px solid var(--border-color);
      padding: 20px;
    }

    .runtime-card.current {
      border-color: rgba(249, 115, 22, 0.3);
    }
