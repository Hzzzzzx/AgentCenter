<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AgentCenter 信息流泳道图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 20px; }
.slide { width: 1200px; height: 700px; background: #FAFAFA; position: relative; margin: 0 auto; border: 1px solid #e0e0e0; overflow: hidden; }
.title { font-size: 24px; font-weight: bold; color: #0a0a0a; position: absolute; top: 12px; left: 25px; }
.title-line { position: absolute; top: 42px; left: 25px; width: 100px; height: 3px; background: #0070F3; }

.lanes-area { position: absolute; top: 58px; left: 25px; width: 780px; }
.lane-row { height: 76px; position: relative; display: flex; }
.lane-row::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; border-bottom: 1px dashed #B0BEC5; }
.lane-label { width: 85px; height: 76px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #37474F; background: #E3F2FD; border-right: 1px solid #90A4AE; position: relative; z-index: 10; }
.lane-label::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: #1976D2; }
.lane-row:nth-child(even) .lane-label { background: #E8F5E9; }
.lane-content { flex: 1; position: relative; height: 76px; }
.lane-connector { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 3; }
.cross-lane-connector { position: absolute; left: 25px; top: 58px; width: 780px; height: 608px; pointer-events: none; z-index: 10; }

.node-box { position: absolute; width: 48px; height: 18px; background: white; border: 1.5px solid #1976D2; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 7px; color: #37474F; font-weight: 500; z-index: 5; }

/* 泳道1: 靠左聚集 */
.lane-row.lane-1 .node-1 { left: 10px; top: 8px; }
.lane-row.lane-1 .node-2 { left: 65px; top: 28px; }
.lane-row.lane-1 .node-3 { left: 120px; top: 50px; }
.lane-row.lane-1 .node-4 { left: 175px; top: 18px; }

/* 泳道2: 波浪型 - 上下波动 */
.lane-row.lane-2 .node-1 { left: 420px; top: 8px; }
.lane-row.lane-2 .node-2 { left: 475px; top: 50px; }
.lane-row.lane-2 .node-3 { left: 530px; top: 8px; }
.lane-row.lane-2 .node-4 { left: 585px; top: 50px; }

/* 泳道3: 中间聚集型 - 两端高中间低 */
.lane-row.lane-3 .node-1 { left: 140px; top: 8px; }
.lane-row.lane-3 .node-2 { left: 195px; top: 48px; }
.lane-row.lane-3 .node-3 { left: 250px; top: 48px; }
.lane-row.lane-3 .node-4 { left: 305px; top: 8px; }

/* 泳道4: 倒波浪型 - 下上波动 */

.lane-row.lane-4 .node-3 { left: 460px; top: 50px; }
.lane-row.lane-4 .node-4 { left: 515px; top: 8px; }

/* 泳道5: V字型 - 先降后升 */

.lane-row.lane-5 .node-2 { left: 75px; top: 52px; }
.lane-row.lane-5 .node-3 { left: 130px; top: 52px; }
.lane-row.lane-5 .node-4 { left: 185px; top: 8px; }

.agent-node::after { content: ""; position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 10px solid #78909C; }
.agent-node:last-child::after { display: none; }

.interaction-line { position: absolute; height: 2px; background: #78909C; z-index: 25; }
.line-1 { left: 815px; top: 100px; width: 60px; }
.line-1::before { content: "调度指令"; position: absolute; left: 50%; transform: translateX(-50%); top: -16px; font-size: 9px; color: #78909C; font-weight: bold; white-space: nowrap; }
.line-1::after { content: ""; position: absolute; left: -6px; top: -4px; border-right: 8px solid #78909C; border-top: 5px solid transparent; border-bottom: 5px solid transparent; }

.line-4::after { content: ""; position: absolute; right: -6px; top: -4px; border-left: 8px solid #78909C; border-top: 5px solid transparent; border-bottom: 5px solid transparent; }

.page-num { position: absolute; bottom: 12px; right: 20px; width: 34px; height: 34px; background: #0070F3; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: bold; z-index: 30; }
</style>
