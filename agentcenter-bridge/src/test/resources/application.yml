server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:file::memory:?cache=shared
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.agentcenter.bridge.domain
  configuration:
    map-underscore-to-camel-case: true

agentcenter:
  runtime:
    default-type: MOCK
    opencode:
      serve:
        enabled: false
        hostname: 127.0.0.1
        port: 4097
        working-directory: ${AGENTCENTER_RUNTIME_WORKSPACE:${user.dir}/runtime-workspace}
        command: opencode
        agent: build
      command: opencode
      model: ""
      timeout-seconds: 180
