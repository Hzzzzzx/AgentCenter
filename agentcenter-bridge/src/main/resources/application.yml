server:
  port: 8080

spring:
  devtools:
    restart:
      enabled: false
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:file:./data/agentcenter.db?busy_timeout=30000&journal_mode=WAL&synchronous=NORMAL
    hikari:
      pool-name: AgentCenterSqlitePool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.agentcenter.bridge.domain
  configuration:
    map-underscore-to-camel-case: true

agentcenter:
  trace:
    conversation-log-enabled: true
  runtime:
    guard:
      retry-limit: 2
      retry-backoff-ms: 700
    opencode:
      serve:
        enabled: true
        hostname: 127.0.0.1
        port: 4097
        working-directory: ${AGENTCENTER_RUNTIME_WORKSPACE:${user.dir}/runtime-workspace}
        command: opencode
        agent: build
      command: opencode
      model: ""
      timeout-seconds: 86400
      wait-interrupted-retry-limit: 1
      wait-interrupted-retry-backoff-ms: 700
      poll-error-retry-limit: 3
      poll-error-retry-backoff-ms: 1000
