server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/agentcenter.db
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.agentcenter.bridge.domain
  configuration:
    map-underscore-to-camel-case: true

agentcenter:
  runtime:
    opencode:
      serve:
        enabled: true
        hostname: 127.0.0.1
        port: 4097
        working-directory: ${user.dir}/..
        command: opencode
        agent: build
      command: opencode
      model: ""
      working-directory: ""
      timeout-seconds: 180
